<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f1f5f9;
        }

        /* 메인 컬러 정의: 딥 블루 */
        :root {
            --brand-blue: #1e40af;
            --brand-dark: #1e293b;
        }

        #map { width: 100%; height: 100%; }

        .student-marker-label {
            position: relative;
            bottom: 50px;
            padding: 6px 12px;
            border-radius: 20px;
            background: var(--brand-blue);
            color: white;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
            border: 2px solid white;
            transform: translateX(-50%);
        }

        .login-bg {
            background: linear-gradient(135deg, #1e40af 0%, #1e293b 100%);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase Client
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [view, setView] = useState('login'); // login, signup, main
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [authForm, setAuthForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markers = useRef({});

            // 1. 학생 데이터 로드 (t_student 테이블)
            const fetchStudents = async () => {
                const { data, error } = await supabase
                    .from('t_student')
                    .select('std_id, std_name');
                
                if (!error && data) {
                    // 지도 표시용 초기 위치 및 랜덤 색상 부여
                    const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'];
                    const formatted = data.map((s, idx) => ({
                        id: s.std_id,
                        name: s.std_name,
                        color: colors[idx % colors.length],
                        lat: 35.2456 + (Math.random() * 0.002 - 0.001),
                        lng: 128.6922 + (Math.random() * 0.002 - 0.001)
                    }));
                    setStudents(formatted);
                }
            };

            // 2. 로그인 처리
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { data, error } = await supabase
                    .from('t_user')
                    .select('*')
                    .eq('user_id', authForm.id)
                    .eq('user_pw', authForm.pw)
                    .single();

                if (data) {
                    setUser(data);
                    setView('main');
                    fetchStudents();
                } else {
                    alert("아이디 또는 비밀번호를 확인해주세요.");
                }
                setLoading(false);
            };

            // 3. 회원가입 처리 (RPC 함수 연동)
            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: authForm.id,
                    p_user_pw: authForm.pw,
                    p_user_name: authForm.name,
                    p_user_school: authForm.school
                });

                if (error) {
                    alert("가입 실패: " + error.message);
                } else {
                    alert("가입되었습니다! 로그인 해주세요.");
                    setView('login');
                }
                setLoading(false);
            };

            // 4. 지도 초기화 및 마커 표시
            useEffect(() => {
                if (view === 'main' && !mapInstance.current) {
                    const container = document.getElementById('map');
                    const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 3 };
                    mapInstance.current = new window.kakao.maps.Map(container, options);
                }
            }, [view]);

            useEffect(() => {
                if (view === 'main' && students.length > 0 && mapInstance.current) {
                    students.forEach(s => {
                        if (!markers.current[s.id]) {
                            const position = new window.kakao.maps.LatLng(s.lat, s.lng);
                            
                            // 마커
                            const marker = new window.kakao.maps.Marker({
                                position: position,
                                map: mapInstance.current
                            });

                            // 라벨
                            const content = `<div class="student-marker-label">${s.name}</div>`;
                            const overlay = new window.kakao.maps.CustomOverlay({
                                position: position,
                                content: content,
                                map: mapInstance.current
                            });

                            markers.current[s.id] = { marker, overlay };
                        }
                    });
                }
            }, [students, view]);

            // 공통 입력창 컴포넌트
            const InputField = ({ label, type="text", placeholder, value, onChange }) => (
                <div className="mb-4">
                    <label className="block text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">{label}</label>
                    <input 
                        type={type}
                        placeholder={placeholder}
                        value={value}
                        onChange={onChange}
                        className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition-all font-semibold text-sm"
                        required
                    />
                </div>
            );

            // 로그인/회원가입 화면
            if (view === 'login' || view === 'signup') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-[400px]">
                            <div className="text-center mb-8">
                                <div className="inline-block p-3 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
                                    <i data-lucide="eye" className="text-white w-8 h-8"></i>
                                </div>
                                <h1 className="text-2xl font-black text-slate-900 tracking-tighter">EYE-LINK</h1>
                                <p className="text-[10px] font-bold text-blue-600 tracking-widest uppercase mt-1">Student Safety Monitor</p>
                            </div>

                            <form onSubmit={view === 'login' ? handleLogin : handleSignup}>
                                {view === 'signup' && (
                                    <InputField label="Name" placeholder="관리자 성함" value={authForm.name} onChange={e => setAuthForm({...authForm, name: e.target.value})} />
                                )}
                                <InputField label="ID" placeholder="아이디" value={authForm.id} onChange={e => setAuthForm({...authForm, id: e.target.value})} />
                                <InputField label="Password" type="password" placeholder="비밀번호" value={authForm.pw} onChange={e => setAuthForm({...authForm, pw: e.target.value})} />
                                {view === 'signup' && (
                                    <InputField label="School" placeholder="소속 학교명" value={authForm.school} onChange={e => setAuthForm({...authForm, school: e.target.value})} />
                                )}
                                
                                <button className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all mt-2 text-sm">
                                    {loading ? "처리 중..." : (view === 'login' ? "로그인" : "회원가입 완료")}
                                </button>
                            </form>

                            <div className="mt-8 text-center">
                                <button 
                                    onClick={() => setView(view === 'login' ? 'signup' : 'login')}
                                    className="text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors"
                                >
                                    {view === 'login' ? "계정이 없으신가요? 회원가입하기" : "이미 계정이 있습니다. 로그인하기"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 메인 대시보드 화면
            return (
                <div className="h-screen flex flex-col bg-white">
                    {/* 상단 헤더: 다크 블루 포인트 */}
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center">
                                <i data-lucide="shield" className="text-white w-5 h-5"></i>
                            </div>
                            <span className="font-black text-lg tracking-tighter text-slate-900">아이-링크 관제</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right mr-4">
                                <p className="text-xs font-black text-slate-900 leading-none mb-1">{user?.user_name} 관리자</p>
                                <p className="text-[10px] text-blue-600 font-bold uppercase">{user?.user_school}</p>
                            </div>
                            <button onClick={() => setView('login')} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                <i data-lucide="log-out" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* 좌측 사이드바: 클릭 불가(순수 리스트) */}
                        <aside className="w-64 border-r bg-slate-50 flex flex-col z-10">
                            <div className="p-5 border-b flex items-center justify-between bg-white">
                                <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-widest">학생 관제 현황</h2>
                                <span className="bg-blue-100 text-blue-700 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">Live</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
                                {students.map(s => (
                                    <div 
                                        key={s.id}
                                        className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-center gap-3 pointer-events-none"
                                    >
                                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: s.color }}></div>
                                        <div className="flex-1">
                                            <p className="text-sm font-bold text-slate-800">{s.name}</p>
                                            <p className="text-[10px] text-slate-400 font-semibold mt-0.5 tracking-tight">GPS 활성화됨</p>
                                        </div>
                                    </div>
                                ))}
                                {students.length === 0 && <p className="text-center py-10 text-xs text-slate-400 font-bold">학생 데이터를 로드 중입니다...</p>}
                            </div>
                        </aside>

                        {/* 메인 지도 */}
                        <main className="flex-1 relative">
                            <div id="map"></div>
                            {/* 지도 위 플로팅 인디케이터 */}
                            <div className="absolute top-6 left-6 z-10">
                                <div className="bg-white/90 backdrop-blur shadow-xl px-4 py-3 rounded-2xl border border-white flex items-center gap-3">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black text-slate-700 uppercase tracking-tight">실시간 서버 연결 상태 양호</span>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        // Lucide 아이콘 초기화 헬퍼
        const IconWrapper = () => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<><IconWrapper /><App /></>);
    </script>
</body>
</html>
