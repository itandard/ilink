<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        .map-error-overlay {
            position: absolute;
            inset: 0;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [mapError, setMapError] = useState(null);
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            
            // 지도 관련 Ref
            const mapRef = useRef(null);
            const markerRef = useRef(null);

            // 입력 폼 상태
            const [formData, setFormData] = useState({ userId: '', password: '' });
            const [gpsInput, setGpsInput] = useState({ lat: '35.190360', lng: '128.815600' });
            const [isSending, setIsSending] = useState(false);

            // 지도 초기화 함수
            const initMap = () => {
                if (typeof window.kakao === 'undefined') {
                    setMapError("Kakao SDK가 로드되지 않았습니다.");
                    return;
                }

                window.kakao.maps.load(() => {
                    try {
                        const container = document.getElementById('map');
                        if (!container) return;

                        const options = {
                            center: new window.kakao.maps.LatLng(parseFloat(gpsInput.lat), parseFloat(gpsInput.lng)),
                            level: 3
                        };
                        const map = new window.kakao.maps.Map(container, options);
                        mapRef.current = map;
                        
                        // 마커 초기화
                        const marker = new window.kakao.maps.Marker({
                            position: options.center
                        });
                        marker.setMap(map);
                        markerRef.current = marker;

                        // 컨트롤 추가
                        map.addControl(new window.kakao.maps.MapTypeControl(), window.kakao.maps.ControlPosition.TOPRIGHT);
                        map.addControl(new window.kakao.maps.ZoomControl(), window.kakao.maps.ControlPosition.RIGHT);

                        setIsMapLoaded(true);
                        setMapError(null);
                    } catch (err) {
                        setMapError("지도 생성 중 오류: " + err.message);
                    }
                });
            };

            // 로그인 이후 지도 초기화 실행
            useEffect(() => {
                if (view === 'dashboard') {
                    const timer = setTimeout(initMap, 500);
                    return () => clearTimeout(timer);
                }
            }, [view]);

            // 위치 수동 업데이트 및 DB 저장
            const updateLocation = async () => {
                if (!mapRef.current || !markerRef.current) return;

                const newLat = parseFloat(gpsInput.lat);
                const newLng = parseFloat(gpsInput.lng);
                const newPos = new window.kakao.maps.LatLng(newLat, newLng);

                // 1. 지도 이동 및 마커 업데이트
                mapRef.current.panTo(newPos);
                markerRef.current.setPosition(newPos);

                // 2. Supabase에 데이터 저장 시도 (실습용)
                setIsSending(true);
                try {
                    const { error } = await supabase
                        .from('gps_logs') // 실제 테이블명이 gps_logs라고 가정
                        .insert([
                            { 
                                device_id: 'MANUAL_TEST', 
                                latitude: newLat, 
                                longitude: newLng,
                                user_id: user?.user_id 
                            }
                        ]);
                    if (error) console.error("DB 저장 실패:", error.message);
                } catch (err) {
                    console.error("전송 오류:", err);
                } finally {
                    setIsSending(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', formData.userId)
                        .eq('user_pw', formData.password)
                        .maybeSingle();

                    if (data) {
                        setUser(data);
                        setView('dashboard');
                    } else {
                        alert("회원 정보를 찾을 수 없습니다.");
                    }
                } catch (err) {
                    alert("로그인 중 오류 발생");
                }
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-200">
                            <h2 className="text-2xl font-black mb-6 text-center text-slate-800">GPS Control</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500"
                                    placeholder="아이디"
                                    value={formData.userId}
                                    onChange={(e) => setFormData({...formData, userId: e.target.value})}
                                />
                                <input 
                                    type="password"
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500"
                                    placeholder="비밀번호"
                                    value={formData.password}
                                    onChange={(e) => setFormData({...formData, password: e.target.value})}
                                />
                                <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg">
                                    로그인
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-white">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white z-20">
                        <div className="flex items-center gap-2">
                            <LucideIcon name="map-pin" className="text-indigo-600" />
                            <h1 className="font-black text-slate-800 uppercase tracking-tighter">GPS Monitoring</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-full">
                                {user?.user_school} | {user?.user_name}
                            </div>
                            <button onClick={() => setView('login')} className="text-slate-400 hover:text-rose-500 transition-colors">
                                <LucideIcon name="log-out" size={18} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex relative">
                        {/* 지도 영역 */}
                        <main className="flex-1 relative bg-slate-50">
                            <div id="map" className="w-full h-full"></div>
                            
                            {mapError && (
                                <div className="map-error-overlay p-8 text-center">
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 max-w-sm">
                                        <LucideIcon name="alert-circle" size={40} className="text-rose-500 mx-auto mb-4" />
                                        <h3 className="font-bold text-slate-800 mb-2">지도를 불러올 수 없음</h3>
                                        <p className="text-xs text-slate-500 mb-6 font-mono bg-slate-50 p-2 rounded">도메인 설정 및 App Key를 확인해주세요.</p>
                                        <button 
                                            onClick={initMap}
                                            className="w-full bg-slate-800 text-white text-xs font-bold py-3 rounded-xl hover:bg-black transition-all"
                                        >
                                            다시 시도
                                        </button>
                                    </div>
                                </div>
                            )}

                            {!isMapLoaded && !mapError && (
                                <div className="absolute inset-0 flex items-center justify-center bg-slate-50 z-10">
                                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                                </div>
                            )}

                            {/* 실습용 좌표 입력 패널 (하단 오버레이) */}
                            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 w-full max-w-xl px-4">
                                <div className="bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-2xl border border-slate-200 flex flex-col md:flex-row items-end gap-4">
                                    <div className="flex-1 grid grid-cols-2 gap-3 w-full">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Latitude (위도)</label>
                                            <input 
                                                type="number"
                                                step="0.000001"
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono"
                                                value={gpsInput.lat}
                                                onChange={(e) => setGpsInput({...gpsInput, lat: e.target.value})}
                                            />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Longitude (경도)</label>
                                            <input 
                                                type="number"
                                                step="0.000001"
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono"
                                                value={gpsInput.lng}
                                                onChange={(e) => setGpsInput({...gpsInput, lng: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                    <button 
                                        onClick={updateLocation}
                                        disabled={isSending}
                                        className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2 whitespace-nowrap active:scale-95 disabled:opacity-50"
                                    >
                                        <LucideIcon name={isSending ? "refresh-cw" : "navigation"} size={16} className={isSending ? "animate-spin" : ""} />
                                        위치 업데이트
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
