<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; touch-action: none; }
        .info-window {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            font-family: 'Pretendard', sans-serif;
            border-radius: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .input-focus {
            transition: all 0.2s ease-in-out;
        }
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [loadingStudents, setLoadingStudents] = useState(false);
            
            const mapRef = useRef(null);
            const markerRef = useRef(null);
            const polylineRef = useRef(null);
            const infoWindowRef = useRef(null);
            const pathPointsRef = useRef([]); 

            const [loginData, setLoginData] = useState({ userId: '', password: '' });
            const [signupData, setSignupData] = useState({ userId: '', password: '', name: '', school: '' });
            const [gpsInput, setGpsInput] = useState({ lat: '35.190360', lng: '128.815600' });
            const [isSending, setIsSending] = useState(false);

            // 학생 정보 불러오기 개선
            const fetchStudents = async () => {
                setLoadingStudents(true);
                try {
                    const { data, error } = await supabase
                        .from('t_student')
                        .select('*')
                        .order('stu_no', { ascending: true });
                    
                    if (error) throw error;
                    if (data) setStudents(data);
                } catch (err) {
                    console.error("학생 목록 로드 실패:", err.message);
                } finally {
                    setLoadingStudents(false);
                }
            };

            const initMap = useCallback(() => {
                if (typeof window.kakao === 'undefined' || !window.kakao.maps) return;

                window.kakao.maps.load(() => {
                    const container = document.getElementById('map');
                    if (!container) return;

                    const initialPos = new window.kakao.maps.LatLng(parseFloat(gpsInput.lat), parseFloat(gpsInput.lng));
                    
                    const options = { 
                        center: initialPos, 
                        level: 3,
                        scrollwheel: true // 휠 줌 명시적 허용
                    };
                    
                    const map = new window.kakao.maps.Map(container, options);
                    
                    // 휠 줌 및 확대/축소 기능 활성화 확인
                    map.setZoomable(true);
                    mapRef.current = map;
                    
                    const marker = new window.kakao.maps.Marker({ position: initialPos });
                    marker.setMap(map);
                    markerRef.current = marker;

                    const polyline = new window.kakao.maps.Polyline({
                        path: [initialPos],
                        strokeWeight: 5,
                        strokeColor: '#4f46e5',
                        strokeOpacity: 0.7,
                        strokeStyle: 'solid'
                    });
                    polyline.setMap(map);
                    polylineRef.current = polyline;
                    pathPointsRef.current = [initialPos];

                    const infowindow = new window.kakao.maps.InfoWindow({ zIndex: 1 });
                    infoWindowRef.current = infowindow;

                    window.kakao.maps.event.addListener(map, 'mousemove', (mouseEvent) => {
                        const latlng = mouseEvent.latLng;
                        infowindow.setContent(`
                            <div class="info-window">
                                <div style="font-weight:bold; color:#4f46e5; margin-bottom:4px;">실시간 위치 좌표</div>
                                <div>위도: ${latlng.getLat().toFixed(6)}</div>
                                <div>경도: ${latlng.getLng().toFixed(6)}</div>
                            </div>
                        `);
                        infowindow.setPosition(latlng);
                        infowindow.open(map);
                    });
                    
                    window.kakao.maps.event.addListener(map, 'mouseout', () => infowindow.close());
                    
                    // 브라우저 리사이즈 대응
                    window.addEventListener('resize', () => map.relayout());
                });
            }, [gpsInput.lat, gpsInput.lng]);

            useEffect(() => {
                if (view === 'dashboard') {
                    fetchStudents();
                    // DOM 렌더링 시간을 고려한 지연 실행
                    const timer = setTimeout(initMap, 200);
                    return () => clearTimeout(timer);
                }
            }, [view, initMap]);

            const updateLocation = async () => {
                if (!mapRef.current) return;
                const newLat = parseFloat(gpsInput.lat);
                const newLng = parseFloat(gpsInput.lng);
                const newPos = new window.kakao.maps.LatLng(newLat, newLng);

                mapRef.current.panTo(newPos);
                markerRef.current.setPosition(newPos);
                const newPath = [...pathPointsRef.current, newPos];
                pathPointsRef.current = newPath;
                polylineRef.current.setPath(newPath);

                setIsSending(true);
                try {
                    await supabase.from('gps_logs').insert([{ 
                        device_id: 'WEB_CONTROL', 
                        latitude: newLat, 
                        longitude: newLng,
                        user_id: user?.user_id 
                    }]);
                } catch(e) {
                    console.error("데이터 전송 오류:", e);
                } finally {
                    setIsSending(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const { data } = await supabase.from('t_user').select('*').eq('user_id', loginData.userId).eq('user_pw', loginData.password).maybeSingle();
                if (data) { setUser(data); setView('dashboard'); } 
                else { alert("정보가 일치하지 않습니다."); }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: signupData.userId,
                    p_user_pw: signupData.password,
                    p_user_name: signupData.name,
                    p_user_school: signupData.school
                });
                if (error) alert("이미 존재하는 아이디입니다.");
                else { alert("가입 완료!"); setView('login'); }
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-4 bg-indigo-50 rounded-3xl text-indigo-600 mb-4">
                                    <LucideIcon name="shield-check" size={32} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">GPS 관제 시스템</h2>
                                <p className="text-slate-400 text-sm mt-2">관리자 계정으로 로그인하세요</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 input-focus" placeholder="아이디" value={loginData.userId} onChange={(e) => setLoginData({...loginData, userId: e.target.value})} required />
                                <input type="password" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 input-focus" placeholder="비밀번호" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} required />
                                <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg active:scale-95">로그인</button>
                                <button type="button" onClick={() => setView('signup')} className="w-full text-slate-400 text-sm font-semibold py-2 hover:text-indigo-600">신규 관리자 등록하기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <h2 className="text-2xl font-black text-slate-800 mb-8 text-center">관리자 계정 생성</h2>
                            <form onSubmit={handleSignup} className="space-y-4">
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="이름" onChange={(e) => setSignupData({...signupData, name: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="아이디" onChange={(e) => setSignupData({...signupData, userId: e.target.value})} required />
                                <input type="password" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호" onChange={(e) => setSignupData({...signupData, password: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="소속 학교" onChange={(e) => setSignupData({...signupData, school: e.target.value})} required />
                                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl mt-4 hover:bg-black transition-all shadow-xl active:scale-95">가입하기</button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-sm font-semibold py-2">뒤로 가기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-white">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white z-20 shadow-sm shrink-0">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <LucideIcon name="map-pin" size={18} />
                            </div>
                            <h1 className="font-black text-slate-800 tracking-tighter text-lg uppercase">GPS Control</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full uppercase">
                                {user?.user_school} · {user?.user_name}
                            </div>
                            <button onClick={() => setView('login')} className="text-slate-300 hover:text-rose-500 transition-colors">
                                <LucideIcon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Left Sidebar: Student List */}
                        <aside className="w-72 border-r border-slate-200 bg-slate-50 flex flex-col z-10 shrink-0">
                            <div className="p-4 border-b border-slate-200 bg-white">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">관리 학생 목록</h2>
                                <div className="relative">
                                    <LucideIcon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input className="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500" placeholder="학생 검색..." />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                {loadingStudents ? (
                                    <div className="flex flex-col items-center justify-center py-10 gap-2">
                                        <div className="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-xs text-slate-400 font-medium">학생 목록 로딩 중...</p>
                                    </div>
                                ) : students.length > 0 ? (
                                    students.map(student => (
                                        <button 
                                            key={student.stu_no}
                                            onClick={() => setSelectedStudent(student)}
                                            className={`w-full flex items-center gap-3 p-3 rounded-2xl transition-all border ${selectedStudent?.stu_no === student.stu_no ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100 scale-[1.02]' : 'bg-white border-slate-100 hover:border-indigo-200 text-slate-600'}`}
                                        >
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold shrink-0 ${selectedStudent?.stu_no === student.stu_no ? 'bg-white/20 text-white' : 'bg-indigo-50 text-indigo-600'}`}>
                                                {student.stu_name.substring(0,1)}
                                            </div>
                                            <div className="text-left overflow-hidden">
                                                <div className="text-sm font-bold leading-tight truncate">{student.stu_name}</div>
                                                <div className={`text-[10px] font-medium ${selectedStudent?.stu_no === student.stu_no ? 'text-indigo-100' : 'text-slate-400'}`}>학번: {student.stu_no}</div>
                                            </div>
                                        </button>
                                    ))
                                ) : (
                                    <div className="text-center py-10">
                                        <p className="text-xs text-slate-400">등록된 학생이 없습니다.</p>
                                    </div>
                                )}
                            </div>
                        </aside>

                        {/* Main Map View */}
                        <main className="flex-1 relative bg-slate-100">
                            <div id="map" className="w-full h-full"></div>
                            
                            {/* Selected Student HUD */}
                            {selectedStudent && (
                                <div className="absolute top-6 left-6 z-20">
                                    <div className="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-white/50 flex items-center gap-4 animate-in fade-in slide-in-from-left-4 duration-300">
                                        <div className="p-3 bg-indigo-600 rounded-xl text-white">
                                            <LucideIcon name="user" size={20} />
                                        </div>
                                        <div>
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Live Tracking</div>
                                            <div className="text-lg font-black text-slate-800">{selectedStudent.stu_name} 관찰 중</div>
                                        </div>
                                        <button onClick={() => setSelectedStudent(null)} className="ml-2 text-slate-400 hover:text-slate-600">
                                            <LucideIcon name="x" size={16} />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Control Pad */}
                            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 w-full max-w-lg px-6">
                                <div className="bg-white/95 backdrop-blur-xl p-5 rounded-[2.5rem] shadow-2xl border border-white/20 flex flex-col md:flex-row items-end gap-3">
                                    <div className="flex-1 grid grid-cols-2 gap-3 w-full">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Latitude</label>
                                            <input type="number" step="0.000001" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-xs font-mono" value={gpsInput.lat} onChange={(e) => setGpsInput({...gpsInput, lat: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Longitude</label>
                                            <input type="number" step="0.000001" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-xs font-mono" value={gpsInput.lng} onChange={(e) => setGpsInput({...gpsInput, lng: e.target.value})} />
                                        </div>
                                    </div>
                                    <button 
                                        onClick={updateLocation}
                                        disabled={isSending}
                                        className="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold text-xs hover:bg-black transition-all shadow-lg flex items-center gap-2 active:scale-95 disabled:opacity-50 shrink-0"
                                    >
                                        <LucideIcon name={isSending ? "refresh-cw" : "send"} size={14} className={isSending ? "animate-spin" : ""} />
                                        위치 전송
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
