<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link (아이-링크)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [loadingStudents, setLoadingStudents] = useState(false);
            
            const mapRef = useRef(null);
            const markerRef = useRef(null);
            const [loginData, setLoginData] = useState({ userId: '', password: '' });
            const [signupData, setSignupData] = useState({ userId: '', password: '', name: '', school: '' });

            // 학생 데이터 로드
            const fetchStudents = async () => {
                setLoadingStudents(true);
                try {
                    const { data, error } = await supabase.from('t_student').select('*').order('stu_no', { ascending: true });
                    if (data) setStudents(data);
                } catch (err) {
                    console.error("Data Load Failed:", err);
                } finally {
                    setLoadingStudents(false);
                }
            };

            // 카카오맵 초기화 (순수 기본 기능 중심)
            const initMap = useCallback(() => {
                if (typeof window.kakao === 'undefined' || !window.kakao.maps) return;

                window.kakao.maps.load(() => {
                    const container = document.getElementById('map');
                    if (!container) return;

                    // 기본 중심 좌표 (임시 좌표)
                    const defaultPos = new window.kakao.maps.LatLng(35.190360, 128.815600);
                    const options = { 
                        center: defaultPos, 
                        level: 3 
                    };
                    
                    const map = new window.kakao.maps.Map(container, options);
                    
                    // 기본 UI 컨트롤 추가
                    map.addControl(new window.kakao.maps.MapTypeControl(), window.kakao.maps.ControlPosition.TOPRIGHT);
                    map.addControl(new window.kakao.maps.ZoomControl(), window.kakao.maps.ControlPosition.RIGHT);

                    mapRef.current = map;
                    
                    // 테스트용 기본 마커
                    const marker = new window.kakao.maps.Marker({ position: defaultPos });
                    marker.setMap(map);
                    markerRef.current = marker;

                    window.addEventListener('resize', () => map.relayout());
                });
            }, []);

            useEffect(() => {
                if (view === 'dashboard') {
                    fetchStudents();
                    setTimeout(initMap, 100);
                }
            }, [view, initMap]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const { data } = await supabase.from('t_user').select('*').eq('user_id', loginData.userId).eq('user_pw', loginData.password).maybeSingle();
                if (data) { setUser(data); setView('dashboard'); } 
                else { alert("아이디 또는 비밀번호를 확인하세요."); }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: signupData.userId,
                    p_user_pw: signupData.password,
                    p_user_name: signupData.name,
                    p_user_school: signupData.school
                });
                if (error) alert("등록에 실패했습니다.");
                else { alert("등록되었습니다."); setView('login'); }
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-block p-4 bg-blue-600 rounded-2xl text-white mb-6 shadow-lg shadow-blue-100">
                                    <LucideIcon name="eye" size={32} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter mb-2 italic">Eye-Link</h2>
                                <p className="text-slate-400 text-sm font-medium tracking-tight">아이-링크 관리자 시스템</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">Admin ID</label>
                                    <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="아이디" value={loginData.userId} onChange={(e) => setLoginData({...loginData, userId: e.target.value})} required />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">Password</label>
                                    <input type="password" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="비밀번호" value={loginData.password} onChange={(e) => setLoginData({...loginData, password: e.target.value})} required />
                                </div>
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-100 mt-4">로그인</button>
                                <button type="button" onClick={() => setView('signup')} className="w-full text-slate-400 text-xs font-semibold py-2">신규 관리자 등록</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                            <h2 className="text-2xl font-black text-slate-900 mb-8 text-center tracking-tight">관리자 계정 생성</h2>
                            <form onSubmit={handleSignup} className="space-y-4">
                                <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none" placeholder="실명" onChange={(e) => setSignupData({...signupData, name: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none" placeholder="아이디" onChange={(e) => setSignupData({...signupData, userId: e.target.value})} required />
                                <input type="password" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none" placeholder="비밀번호" onChange={(e) => setSignupData({...signupData, password: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none" placeholder="소속(학교/기관)" onChange={(e) => setSignupData({...signupData, school: e.target.value})} required />
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-4">등록하기</button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-xs font-semibold py-2">이전으로</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    {/* Header */}
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white shrink-0 z-30 shadow-sm">
                        <div className="flex flex-col">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                    <LucideIcon name="eye" size={16} />
                                </div>
                                <span className="font-black text-slate-900 tracking-tighter text-xl italic uppercase">Eye-Link</span>
                            </div>
                            <span className="text-[10px] font-bold text-blue-500 mt-0.5 tracking-tight">특수아동 현장체험학습 안전 솔루션</span>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex flex-col items-end">
                                <span className="text-[11px] font-black text-slate-800">{user?.user_name} 관리자</span>
                                <span className="text-[10px] font-medium text-slate-400">{user?.user_school}</span>
                            </div>
                            <button onClick={() => setView('login')} className="p-2 bg-slate-50 text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-all rounded-xl">
                                <LucideIcon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-72 border-r border-slate-200 flex flex-col shrink-0 bg-white z-20">
                            <div className="p-5 border-b border-slate-100">
                                <h2 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">안전 관리 목록</h2>
                                <div className="relative">
                                    <LucideIcon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" />
                                    <input className="w-full pl-9 pr-4 py-2.5 bg-slate-50 rounded-xl text-xs outline-none" placeholder="학생 검색..." />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-1">
                                {loadingStudents ? (
                                    <div className="p-10 text-center flex flex-col items-center gap-2">
                                        <div className="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                        <span className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Syncing...</span>
                                    </div>
                                ) : students.map(s => (
                                    <button 
                                        key={s.stu_no}
                                        onClick={() => setSelectedStudent(s)}
                                        className={`w-full flex items-center gap-3 p-3.5 rounded-2xl transition-all ${selectedStudent?.stu_no === s.stu_no ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-600'}`}
                                    >
                                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-xs font-black shrink-0 ${selectedStudent?.stu_no === s.stu_no ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            {s.stu_name.substring(0,1)}
                                        </div>
                                        <div className="text-left flex-1">
                                            <div className="text-xs font-bold">{s.stu_name} 학생</div>
                                            <div className={`text-[10px] font-medium opacity-60 ${selectedStudent?.stu_no === s.stu_no ? 'text-white' : 'text-slate-400'}`}>ID: {s.stu_no}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        {/* Map Container */}
                        <main className="flex-1 relative bg-slate-50">
                            <div id="map" className="w-full h-full"></div>
                            
                            {/* HUD Indicator */}
                            {selectedStudent && (
                                <div className="absolute top-6 left-6 z-10">
                                    <div className="bg-white/95 backdrop-blur-md px-6 py-4 rounded-3xl shadow-2xl border border-white flex items-center gap-4 animate-in fade-in slide-in-from-top-4">
                                        <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-sm">
                                            {selectedStudent.stu_name.substring(0,1)}
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-[13px] font-black text-slate-800">{selectedStudent.stu_name} 학생</span>
                                            <div className="flex items-center gap-1.5">
                                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                                <span className="text-[10px] font-bold text-emerald-600 uppercase">Live Tracking</span>
                                            </div>
                                        </div>
                                        <button onClick={() => setSelectedStudent(null)} className="ml-2 text-slate-300 hover:text-slate-500 transition-colors">
                                            <LucideIcon name="x" size={16} />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Status */}
                            <div className="absolute bottom-6 right-6 z-10">
                                <div className="bg-slate-900 text-white px-5 py-2.5 rounded-full text-[10px] font-black tracking-widest uppercase flex items-center gap-3 shadow-2xl">
                                    <span className="text-blue-400 italic">Eye-Link</span>
                                    <span className="w-1 h-1 rounded-full bg-blue-500 animate-ping"></span>
                                    Monitoring System Active
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
