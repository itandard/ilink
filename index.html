<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        /**
         * [필독] 아래 정보를 본인의 설정값으로 채워주세요.
         * 지도가 안 나오는 주원인은 KAKAO_MAP_KEY(JavaScript 키)와 도메인 미등록입니다.
         */
        const KAKAO_MAP_KEY = "173d252d4d96821fe2235b962120637b"; // 반드시 'JavaScript 키'를 입력하세요.
        const SUPABASE_URL = "";    // 비어있어도 지도는 뜹니다.
        const SUPABASE_ANON_KEY = ""; // 비어있어도 지도는 뜹니다.

        const App = () => {
            const [supabase, setSupabase] = useState(null);
            const [lat, setLat] = useState('35.190360'); 
            const [lng, setLng] = useState('128.815600'); 
            const [mapLoaded, setMapLoaded] = useState(false);
            const [mapError, setMapError] = useState(null);

            const mapRef = useRef(null);
            const kakaoMapInstance = useRef(null);
            const kakaoMarkerInstance = useRef(null);

            // Supabase 초기화 (값이 있을 때만)
            useEffect(() => {
                if (window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY) {
                    try {
                        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        setSupabase(client);
                    } catch (e) {
                        console.error("Supabase Init Error:", e);
                    }
                }
            }, []);

            const initMap = () => {
                if (!mapRef.current) return;
                
                if (typeof window.kakao === 'undefined' || !window.kakao.maps) {
                    setMapError("카카오 SDK 로드 실패. 키가 'JavaScript 키'가 맞는지, 도메인이 등록되었는지 확인하세요.");
                    return;
                }

                window.kakao.maps.load(() => {
                    try {
                        const container = mapRef.current;
                        const options = {
                            center: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)),
                            level: 3
                        };
                        const map = new window.kakao.maps.Map(container, options);
                        kakaoMapInstance.current = map;

                        const marker = new window.kakao.maps.Marker({
                            position: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng))
                        });
                        marker.setMap(map);
                        kakaoMarkerInstance.current = marker;
                        
                        setMapLoaded(true);
                        setMapError(null);
                    } catch (e) {
                        setMapError("지도 생성 에러: " + e.message);
                    }
                });
            };

            useEffect(() => {
                const script = document.createElement('script');
                script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_MAP_KEY}&autoload=false`;
                script.async = true;
                script.onload = initMap;
                script.onerror = () => setMapError("카카오 서버 통신 불가 (키/도메인 에러)");
                document.head.appendChild(script);
            }, []);

            const updateLocation = () => {
                if (kakaoMapInstance.current) {
                    const loc = new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng));
                    kakaoMapInstance.current.panTo(loc);
                    if (kakaoMarkerInstance.current) kakaoMarkerInstance.current.setPosition(loc);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 overflow-hidden">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center z-30 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-yellow-400 p-2 rounded-lg text-slate-900"><Icon name="map" /></div>
                            <h1 className="text-lg font-black tracking-tight">GPS MONITOR</h1>
                        </div>
                        <button onClick={() => window.location.reload()} className="text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full hover:bg-slate-200 transition-all">
                            새로고침
                        </button>
                    </header>

                    <main className="flex-1 relative">
                        <div ref={mapRef} className="w-full h-full bg-slate-200">
                            {mapError && (
                                <div className="absolute inset-0 z-40 bg-white/90 backdrop-blur-md flex items-center justify-center p-6 text-center">
                                    <div className="max-w-sm">
                                        <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <Icon name="shield-alert" size={32} />
                                        </div>
                                        <h2 className="text-xl font-bold mb-2">인증에 실패했습니다</h2>
                                        <p className="text-sm text-slate-500 mb-4">{mapError}</p>
                                        <div className="bg-slate-100 p-3 rounded-xl mb-4 text-[11px] font-mono break-all border">
                                            등록할 도메인: {window.location.origin}
                                        </div>
                                        <p className="text-[10px] text-slate-400">카카오 개발자 센터에서 'JavaScript 키'를 사용 중인지, 위 도메인이 등록되었는지 다시 확인해 주세요.</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Overlay Controls */}
                        <div className="absolute bottom-6 left-6 right-6 md:w-72 z-30 space-y-4">
                            <div className="bg-white/95 backdrop-blur shadow-2xl rounded-2xl border border-slate-200 p-5">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Position Control</h3>
                                <div className="grid grid-cols-2 gap-2 mb-4 font-mono">
                                    <input type="number" value={lat} onChange={e=>setLat(e.target.value)} className="bg-slate-50 border p-2 rounded-lg text-xs outline-none focus:ring-1 focus:ring-yellow-400" />
                                    <input type="number" value={lng} onChange={e=>setLng(e.target.value)} className="bg-slate-50 border p-2 rounded-lg text-xs outline-none focus:ring-1 focus:ring-yellow-400" />
                                </div>
                                <button onClick={updateLocation} className="w-full bg-yellow-400 hover:bg-yellow-500 font-bold py-2.5 rounded-xl text-xs transition-transform active:scale-95 shadow-lg shadow-yellow-100">
                                    지도 위치 이동
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
