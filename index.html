<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 카카오 맵 API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f1f5f9; }
        
        .student-label {
            position: relative;
            bottom: 45px;
            padding: 4px 10px;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 세련된 파란색 그라데이션 배경 */
        .login-bg {
            background: linear-gradient(135deg, #f0f7ff 0%, #e0eefc 100%);
            position: relative;
        }
        .login-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [loginInfo, setLoginInfo] = useState({ id: '', pw: '' });
            const [mapIsReady, setMapIsReady] = useState(false);
            
            // 학생 가상 데이터
            const [students, setStudents] = useState([
                { id: 1, name: '학생 1', color: '#2563eb', lat: 35.2456, lng: 128.6922, path: [], dir: { lat: 0.0002, lng: 0.0001 } },
                { id: 2, name: '학생 2', color: '#dc2626', lat: 35.2460, lng: 128.6930, path: [], dir: { lat: -0.0001, lng: 0.0003 } },
                { id: 3, name: '학생 3', color: '#16a34a', lat: 35.2445, lng: 128.6910, path: [], dir: { lat: 0.0001, lng: -0.0002 } }
            ]);
            
            const [selectedStudentId, setSelectedStudentId] = useState(null);
            const mapRef = useRef(null);
            const markersRef = useRef({});
            const overlaysRef = useRef({});
            const polylineRef = useRef(null);

            const initMap = () => {
                const container = document.getElementById('map');
                if (!container || mapRef.current) return;
                const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 4 };
                mapRef.current = new window.kakao.maps.Map(container, options);
                setMapIsReady(true);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase
                    .from('t_user')
                    .select('*')
                    .eq('user_id', loginInfo.id)
                    .eq('user_pw', loginInfo.pw)
                    .single();

                if (error || !data) return alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                
                await supabase.from('t_login').insert([{ 
                    user_id: loginInfo.id, 
                    platform: 'Web', 
                    user_agent: navigator.userAgent
                }]);
                
                setUser(data);
                setView('dashboard');
            };

            useEffect(() => {
                if (view !== 'dashboard' || !mapIsReady) return;

                const moveInterval = setInterval(() => {
                    setStudents(prev => prev.map(s => {
                        const nextLat = s.lat + s.dir.lat;
                        const nextLng = s.lng + s.dir.lng;
                        const nextPos = new window.kakao.maps.LatLng(nextLat, nextLng);

                        if (!markersRef.current[s.id]) {
                            const markerImg = `data:image/svg+xml;base64,${btoa(`
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="12" cy="12" r="8" fill="${s.color}" stroke="white" stroke-width="3"/>
                                </svg>
                            `)}`;
                            const imageSize = new window.kakao.maps.Size(24, 24);
                            const markerImage = new window.kakao.maps.MarkerImage(markerImg, imageSize);

                            markersRef.current[s.id] = new window.kakao.maps.Marker({
                                position: nextPos,
                                image: markerImage,
                                map: mapRef.current
                            });

                            overlaysRef.current[s.id] = new window.kakao.maps.CustomOverlay({
                                position: nextPos,
                                content: `<div class="student-label" style="background:${s.color}">${s.name}</div>`,
                                yAnchor: 1,
                                map: mapRef.current
                            });
                        } else {
                            markersRef.current[s.id].setPosition(nextPos);
                            overlaysRef.current[s.id].setPosition(nextPos);
                        }

                        return { ...s, lat: nextLat, lng: nextLng, path: [...s.path, nextPos] };
                    }));
                }, 3000);

                return () => clearInterval(moveInterval);
            }, [view, mapIsReady]);

            useEffect(() => {
                if (!mapRef.current || !mapIsReady) return;
                if (polylineRef.current) polylineRef.current.setMap(null);

                if (selectedStudentId) {
                    const student = students.find(s => s.id === selectedStudentId);
                    if (student && student.path.length > 0) {
                        polylineRef.current = new window.kakao.maps.Polyline({
                            path: student.path,
                            strokeWeight: 4,
                            strokeColor: student.color,
                            strokeOpacity: 0.8,
                            strokeStyle: 'dashed'
                        });
                        polylineRef.current.setMap(mapRef.current);
                        
                        // 클릭 시 해당 학생 위치로 지도 중심 이동
                        const moveLatLng = new window.kakao.maps.LatLng(student.lat, student.lng);
                        mapRef.current.panTo(moveLatLng);
                    }
                }
            }, [students, selectedStudentId, mapIsReady]);

            useEffect(() => {
                if (view === 'dashboard') {
                    const checkKakao = setInterval(() => {
                        if (window.kakao && window.kakao.maps) {
                            initMap();
                            clearInterval(checkKakao);
                        }
                    }, 100);
                    return () => clearInterval(checkKakao);
                }
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg p-6 font-sans">
                        <div className="bg-white/90 backdrop-blur-2xl p-10 rounded-[2.5rem] shadow-[0_40px_80px_-20px_rgba(37,99,235,0.15)] border border-blue-50 w-full max-w-[400px]">
                            <div className="text-center mb-10">
                                <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-xl shadow-blue-100">
                                    <LucideIcon name="eye" size={32} className="text-white" />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter mb-1">EYE-LINK</h2>
                                <p className="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em] ml-1">관제 시스템 관리자</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-widest">아이디</label>
                                    <input 
                                        className="w-full px-6 py-4 bg-blue-50/50 border border-blue-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all font-bold text-slate-700 placeholder:text-blue-200 text-sm" 
                                        placeholder="아이디를 입력하세요" 
                                        value={loginInfo.id} 
                                        onChange={e => setLoginInfo({...loginInfo, id: e.target.value})} 
                                        required 
                                    />
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-widest">비밀번호</label>
                                    <input 
                                        type="password" 
                                        className="w-full px-6 py-4 bg-blue-50/50 border border-blue-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all font-bold text-slate-700 placeholder:text-blue-200 text-sm" 
                                        placeholder="비밀번호를 입력하세요" 
                                        value={loginInfo.pw} 
                                        onChange={e => setLoginInfo({...loginInfo, pw: e.target.value})} 
                                        required 
                                    />
                                </div>
                                <button className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 mt-4 active:scale-[0.98] text-base tracking-tight">
                                    로그인
                                </button>
                            </form>
                            
                            <div className="mt-8 pt-6 border-t border-blue-50 flex flex-col items-center gap-4">
                                <button 
                                    onClick={() => window.location.href = 'signup.html'}
                                    className="text-sm font-bold text-slate-400 hover:text-blue-600 transition-colors"
                                >
                                    처음이신가요? <span className="text-blue-500 underline underline-offset-4">회원가입</span>
                                </button>
                                <p className="text-[10px] text-blue-200 font-bold tracking-widest uppercase">© 2026 EYE-LINK TECH</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-50">
                    <header className="h-16 border-b flex items-center justify-between px-8 bg-white shrink-0 z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                                <LucideIcon name="shield" size={16} className="text-white" />
                            </div>
                            <span className="font-black text-xl tracking-tighter text-slate-900">EYE-LINK <span className="text-blue-600">관제</span></span>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col items-end">
                                <span className="text-sm font-black text-slate-900">{user?.user_name} 관리자님</span>
                                <span className="text-[10px] text-blue-500 font-bold uppercase tracking-tighter">{user?.user_school}</span>
                            </div>
                            <div className="h-10 w-[1.5px] bg-slate-100"></div>
                            <button onClick={() => setView('login')} className="flex items-center gap-2 px-4 py-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all font-bold text-xs">
                                <LucideIcon name="log-out" size={18} />
                                <span>로그아웃</span>
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-72 border-r flex flex-col bg-white shrink-0 shadow-xl z-10">
                            <div className="p-6 border-b bg-slate-50/30 flex items-center justify-between">
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest">실시간 학생 현황</h3>
                                <div className="flex items-center gap-1.5 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-[9px] font-black text-emerald-600 uppercase">Live</span>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                {students.map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={() => setSelectedStudentId(s.id)}
                                        className={`w-full flex items-center gap-4 p-5 rounded-2xl transition-all border ${selectedStudentId === s.id ? 'bg-blue-600 border-blue-600 text-white shadow-xl shadow-blue-100' : 'bg-white border-slate-100 hover:border-blue-200 hover:bg-blue-50/30'}`}
                                    >
                                        <div className={`w-3 h-3 rounded-full border-2 ${selectedStudentId === s.id ? 'border-white' : 'border-white shadow-sm'}`} style={{ backgroundColor: s.color }}></div>
                                        <span className="text-base font-bold tracking-tight">{s.name}</span>
                                        {selectedStudentId === s.id && <LucideIcon name="target" size={16} className="ml-auto opacity-70" />}
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <div className="flex-1 relative">
                            <div id="map"></div>
                            <div className="absolute top-6 left-6 flex flex-col gap-3 z-10">
                                <div className="bg-white/90 backdrop-blur-md shadow-2xl px-5 py-3 rounded-2xl border border-white flex items-center gap-3">
                                    <div className="w-3 h-3 bg-blue-600 rounded-full animate-ping"></div>
                                    <span className="text-xs font-black text-slate-700 uppercase tracking-tight">위치 추적 시스템 가동 중</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
