<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@lucide/lab@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
        }

        :root {
            --brand-blue: #1e40af;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

        .student-marker-label {
            position: relative;
            bottom: 55px;
            padding: 5px 10px;
            border-radius: 12px;
            color: white;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid white;
            transform: translateX(-50%);
        }

        .login-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const InputField = ({ label, type="text", placeholder, value, onChange }) => (
            <div className="mb-4 text-left">
                <label className="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 tracking-tight">{label}</label>
                <input 
                    type={type}
                    placeholder={placeholder}
                    value={value}
                    onChange={onChange}
                    className="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-50/50 transition-all font-semibold text-sm"
                    required
                />
            </div>
        );

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [authForm, setAuthForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapInstance = useRef(null);
            const markers = useRef({});

            // 학생 데이터 초기 로드 및 색상 할당
            const fetchStudents = async () => {
                const { data, error } = await supabase
                    .from('t_student')
                    .select('stu_no, stu_name');
                
                if (!error && data) {
                    const colors = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'];
                    const formatted = data.map((s, idx) => ({
                        id: s.stu_no,
                        name: s.stu_name,
                        color: colors[idx % colors.length],
                        lat: 35.2456 + (Math.random() * 0.002 - 0.001),
                        lng: 128.6922 + (Math.random() * 0.002 - 0.001)
                    }));
                    setStudents(formatted);
                }
            };

            // 위치 이동 시뮬레이션 (3초 간격)
            useEffect(() => {
                if (view === 'main' && students.length > 0) {
                    const interval = setInterval(() => {
                        setStudents(prev => prev.map(s => ({
                            ...s,
                            lat: s.lat + (Math.random() * 0.0004 - 0.0002),
                            lng: s.lng + (Math.random() * 0.0004 - 0.0002)
                        })));
                    }, 3000);
                    return () => clearInterval(interval);
                }
            }, [view, students.length > 0]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    // 1. 사용자 인증 확인
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (data) {
                        // 2. 로그인 성공 시 t_login 테이블에 기록 남기기
                        await supabase
                            .from('t_login')
                            .insert([
                                { 
                                    user_id: authForm.id, 
                                    login_time: new Date().toISOString(),
                                    device_info: window.navigator.userAgent 
                                }
                            ]);

                        setUser(data);
                        setView('main');
                        fetchStudents();
                    } else {
                        alert("아이디 또는 비밀번호를 확인해주세요.");
                    }
                } catch (err) {
                    console.error("Login Error:", err);
                    alert("로그인 처리 중 오류가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: authForm.id,
                    p_user_pw: authForm.pw,
                    p_user_name: authForm.name,
                    p_user_school: authForm.school
                });

                if (error) {
                    alert("등록 실패: " + error.message);
                } else {
                    alert("성공적으로 등록되었습니다! 로그인 해주세요.");
                    setView('login');
                }
                setLoading(false);
            };

            // 지도 초기화
            useEffect(() => {
                if (view === 'main') {
                    setTimeout(() => {
                        const container = document.getElementById('map');
                        if (!container) return;

                        if (!mapInstance.current) {
                            const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 3 };
                            mapInstance.current = new window.kakao.maps.Map(container, options);
                        } else {
                            mapInstance.current.relayout();
                        }
                    }, 100);
                }
            }, [view]);

            // 학생 마커 및 오버레이 업데이트 (위치 변화 감지)
            useEffect(() => {
                if (view === 'main' && mapInstance.current) {
                    students.forEach(s => {
                        const position = new window.kakao.maps.LatLng(s.lat, s.lng);
                        
                        if (!markers.current[s.id]) {
                            // 마커 생성
                            const marker = new window.kakao.maps.Marker({ 
                                position: position, 
                                map: mapInstance.current 
                            });
                            
                            // 커스텀 오버레이 생성 (고유 색상 적용)
                            const content = `<div class="student-marker-label" style="background-color: ${s.color}">${s.name}</div>`;
                            const overlay = new window.kakao.maps.CustomOverlay({ 
                                position: position, 
                                content: content, 
                                map: mapInstance.current 
                            });
                            
                            markers.current[s.id] = { marker, overlay };
                        } else {
                            // 기존 마커 및 오버레이 위치 이동
                            markers.current[s.id].marker.setPosition(position);
                            markers.current[s.id].overlay.setPosition(position);
                        }
                    });
                }
            }, [students, view]);

            if (view === 'login' || view === 'signup') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] w-full max-w-[420px] border border-slate-100">
                            <div className="text-center mb-10">
                                {/* 눈 모양 아이콘 복구 */}
                                <div className="inline-block p-4 bg-blue-700 rounded-2xl mb-5 shadow-xl shadow-blue-100">
                                    <i data-lucide="eye" className="text-white w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter mb-1 font-sans">아이-링크(Eye-Link)</h1>
                                <div className="h-1 w-12 bg-blue-600 mx-auto rounded-full mb-2"></div>
                                <p className="text-[11px] font-bold text-slate-500 tracking-tight">특수아동 현장체험학습 안전 솔루션</p>
                            </div>

                            <form onSubmit={view === 'login' ? handleLogin : handleSignup}>
                                {view === 'signup' && (
                                    <InputField label="사용자 이름" placeholder="관리자 실명 입력" value={authForm.name} onChange={e => setAuthForm({...authForm, name: e.target.value})} />
                                )}
                                <InputField label="아이디" placeholder="아이디를 입력하세요" value={authForm.id} onChange={e => setAuthForm({...authForm, id: e.target.value})} />
                                <InputField label="비밀번호" type="password" placeholder="비밀번호를 입력하세요" value={authForm.pw} onChange={e => setAuthForm({...authForm, pw: e.target.value})} />
                                {view === 'signup' && (
                                    <InputField label="소속 학교" placeholder="학교명 (예: 창원초등학교)" value={authForm.school} onChange={e => setAuthForm({...authForm, school: e.target.value})} />
                                )}
                                
                                <button className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all mt-4 text-sm active:scale-[0.98]">
                                    {loading ? "처리 중..." : (view === 'login' ? "로그인" : "관리자 등록 완료")}
                                </button>
                            </form>

                            <div className="mt-10 text-center">
                                <button 
                                    onClick={() => setView(view === 'login' ? 'signup' : 'login')}
                                    className="text-xs font-bold text-slate-400 hover:text-blue-600 transition-all border-b border-transparent hover:border-blue-200 pb-0.5"
                                >
                                    {view === 'login' ? "아직 계정이 없으신가요? 관리자 등록" : "이미 계정이 있습니다. 로그인으로 돌아가기"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white text-slate-900">
                    <header className="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-10 z-20">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                                <i data-lucide="shield-check" className="text-white w-6 h-6"></i>
                            </div>
                            <div>
                                <h2 className="font-black text-xl tracking-tighter text-slate-900">아이-링크(Eye-Link) 관제 현황</h2>
                                <p className="text-[10px] text-blue-600 font-bold tracking-tight uppercase">특수아동 현장체험학습 안전 솔루션</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col items-end border-r pr-6 border-slate-100">
                                <p className="text-sm font-black text-slate-900 leading-none mb-1">{user?.user_name} 관리자님</p>
                                <p className="text-[10px] text-slate-400 font-bold tracking-tight">{user?.user_school}</p>
                            </div>
                            <button onClick={() => setView('login')} className="flex items-center gap-2 text-slate-400 hover:text-red-500 transition-all group font-bold text-xs">
                                <span>로그아웃</span>
                                <i data-lucide="log-out" className="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-72 border-r border-slate-100 bg-slate-50/50 flex flex-col z-10 shadow-sm">
                            <div className="p-6 border-b border-slate-100 bg-white flex items-center justify-between">
                                <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-widest">보호 대상 명단</h3>
                                <div className="flex items-center gap-1.5 bg-blue-50 text-blue-600 text-[9px] font-black px-2 py-1 rounded-md">
                                    <span className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></span>
                                    실시간
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5 space-y-3 custom-scroll">
                                {students.map(s => (
                                    <div 
                                        key={s.id}
                                        className="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex items-center gap-4 transition-all"
                                    >
                                        <div className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: s.color }}></div>
                                        <div className="flex-1">
                                            <p className="text-sm font-bold text-slate-800">{s.name}</p>
                                            <p className="text-[9px] text-slate-400 font-bold mt-1 tracking-tight">학번: {s.id}</p>
                                        </div>
                                        <div className="px-2 py-1 bg-green-50 rounded-lg text-[9px] font-bold text-green-600">
                                            정상
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 relative bg-slate-100">
                            <div id="map"></div>
                            
                            <div className="absolute top-8 left-8 z-10">
                                <div className="bg-white/90 backdrop-blur-xl shadow-2xl px-6 py-4 rounded-[1.5rem] border border-white/50 flex items-center gap-4">
                                    <div className="relative">
                                        <div className="w-3 h-3 bg-green-500 rounded-full animate-ping absolute inset-0"></div>
                                        <div className="w-3 h-3 bg-green-500 rounded-full relative"></div>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-800 leading-none mb-1">시스템 상태</p>
                                        <p className="text-[9px] text-slate-500 font-bold">3초 간격 위치 업데이트 중</p>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const IconWrapper = () => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<><IconWrapper /><App /></>);
    </script>
</body>
</html>
