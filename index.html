<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link (아이-링크) - 한글판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 카카오맵 API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .custom-overlay {
            position: relative;
            bottom: 55px;
            background: #2563eb;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            white-space: nowrap;
            border: 2px solid white;
        }
        .custom-overlay::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .dot-marker {
            width: 8px;
            height: 8px;
            background: #2563eb;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [loginInfo, setLoginInfo] = useState({ id: '', pw: '' });
            const [isProcessing, setIsProcessing] = useState(false);
            
            const [students] = useState([
                { stu_no: 1, stu_name: '김민수', status: '정상' },
                { stu_no: 2, stu_name: '이서연', status: '주의' },
                { stu_no: 3, stu_name: '박준혁', status: '정상' },
                { stu_no: 4, stu_name: '최다인', status: '미감지' }
            ]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const mapRef = useRef(null);
            const mainMarkerRef = useRef(null);
            const pathMarkersRef = useRef([]);
            const polylineRef = useRef(null);
            const overlayRef = useRef(null);
            const simIntervalRef = useRef(null);

            // Canvas의 SQL 로직에 맞춘 플랫폼 감지 함수
            const getPlatform = () => {
                const ua = navigator.userAgent;
                if (/ipad|iphone|ipod/i.test(ua)) return "iOS";
                if (/android/i.test(ua)) return "Android";
                if (/win/i.test(ua)) return "Windows";
                if (/mac/i.test(ua)) return "Mac OS";
                if (/linux/i.test(ua)) return "Linux";
                return "기타 PC";
            };

            const initMap = () => {
                const container = document.getElementById('map');
                if (!container || mapRef.current) return;
                const startPos = new window.kakao.maps.LatLng(35.2456, 128.6922); 
                const options = { center: startPos, level: 3 };
                const map = new window.kakao.maps.Map(container, options);
                mapRef.current = map;
            };

            // 로그인 및 t_login 기록 핸들러
            const handleLogin = async (e) => {
                e.preventDefault();
                setIsProcessing(true);

                try {
                    // 1. t_user 테이블에서 계정 정보 확인
                    const { data: userData, error: userError } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', loginInfo.id)
                        .eq('user_pw', loginInfo.pw)
                        .single();

                    if (userError || !userData) {
                        alert("아이디 또는 비밀번호가 올바르지 않습니다.");
                        setIsProcessing(false);
                        return;
                    }

                    // 2. t_login 테이블에 로그인 로그 삽입 (Canvas에 작성된 SQL 구조 활용)
                    const platform = getPlatform();
                    const { error: logError } = await supabase
                        .from('t_login')
                        .insert([{
                            user_id: loginInfo.id,
                            platform: platform,
                            user_agent: navigator.userAgent
                        }]);

                    if (logError) {
                        console.error("로그 기록 실패:", logError.message);
                    }

                    // 3. 앱 상태 업데이트
                    setUser(userData);
                    setView('dashboard');

                } catch (err) {
                    console.error("오류 발생:", err);
                    alert("시스템 오류가 발생했습니다.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const startSimulation = (student) => {
                if (!mapRef.current) return;
                const startLat = 35.2456;
                const startLng = 128.6922;
                const initialPos = new window.kakao.maps.LatLng(startLat, startLng);
                mapRef.current.panTo(initialPos);
                // 시뮬레이션 상세 로직 생략 (기존과 동일)
            };

            useEffect(() => {
                if (view === 'dashboard') setTimeout(initMap, 100);
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-10 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-block p-4 bg-blue-600 rounded-2xl text-white mb-6 shadow-lg shadow-blue-100">
                                    <LucideIcon name="eye" size={32} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter mb-2">아이-링크</h2>
                                <p className="text-slate-400 text-sm font-medium tracking-tight">통합 안전 관제 시스템</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">관리자 아이디</label>
                                    <input 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600" 
                                        placeholder="ID를 입력하세요" 
                                        value={loginInfo.id}
                                        onChange={(e) => setLoginInfo({...loginInfo, id: e.target.value})}
                                        required 
                                    />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">비밀번호</label>
                                    <input 
                                        type="password" 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600" 
                                        placeholder="••••••••" 
                                        value={loginInfo.pw}
                                        onChange={(e) => setLoginInfo({...loginInfo, pw: e.target.value})}
                                        required 
                                    />
                                </div>
                                <button 
                                    disabled={isProcessing}
                                    className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg active:scale-[0.98] mt-2 disabled:bg-slate-300"
                                >
                                    {isProcessing ? "로그인 중..." : "시스템 접속"}
                                </button>
                                <div className="text-center mt-6 pt-6 border-t border-slate-100">
                                    <a href="signup.html" className="text-blue-600 text-xs font-bold hover:underline">신규 관리자 가입하기</a>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white shrink-0 z-30">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                <LucideIcon name="eye" size={16} />
                            </div>
                            <span className="font-black text-slate-900 tracking-tighter text-xl italic uppercase">Eye-Link</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[11px] font-black text-slate-800 uppercase leading-none">{user?.user_name} 관리자님</p>
                                <p className="text-[9px] font-bold text-slate-400 tracking-tighter mt-1">{user?.user_school}</p>
                            </div>
                            <button onClick={() => setView('login')} className="p-2 bg-slate-50 text-slate-400 hover:text-rose-500 rounded-xl transition-all">
                                <LucideIcon name="log-out" size={18} />
                            </button>
                        </div>
                    </header>
                    <div className="flex-1 relative">
                        <div id="map" className="w-full h-full"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
