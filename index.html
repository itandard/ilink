<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f1f5f9; }
        
        .student-label {
            position: relative;
            bottom: 45px;
            padding: 4px 10px;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 이전의 깔끔한 로그인 배경 스타일 */
        .login-bg {
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase Init
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [loginInfo, setLoginInfo] = useState({ id: '', pw: '' });
            
            // 학생 초기 데이터
            const [students, setStudents] = useState([
                { id: 1, name: '학생 1', color: '#2563eb', lat: 35.2456, lng: 128.6922, path: [], dir: { lat: 0.0002, lng: 0.0001 } },
                { id: 2, name: '학생 2', color: '#dc2626', lat: 35.2460, lng: 128.6930, path: [], dir: { lat: -0.0001, lng: 0.0003 } },
                { id: 3, name: '학생 3', color: '#16a34a', lat: 35.2445, lng: 128.6910, path: [], dir: { lat: 0.0001, lng: -0.0002 } }
            ]);
            
            const [selectedStudentId, setSelectedStudentId] = useState(null);
            const mapRef = useRef(null);
            const markersRef = useRef({});
            const overlaysRef = useRef({});
            const polylineRef = useRef(null);

            // 카카오맵 초기화
            const initMap = () => {
                const container = document.getElementById('map');
                if (!container || mapRef.current) return;
                const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 4 };
                mapRef.current = new window.kakao.maps.Map(container, options);
            };

            // 로그인 처리
            const handleLogin = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase.from('t_user').select('*').eq('user_id', loginInfo.id).eq('user_pw', loginInfo.pw).single();
                if (error || !data) return alert("로그인 정보를 확인해주세요.");
                
                // 로그인 로그 기록 (시간은 DB의 DEFAULT CURRENT_TIMESTAMP(0)가 처리하도록 파라미터 제외)
                await supabase.from('t_login').insert([{ 
                    user_id: loginInfo.id, 
                    platform: 'Web', 
                    user_agent: navigator.userAgent
                    // login_time은 DB에서 자동으로 'Asia/Seoul' 기준 TIMESTAMP(0)로 입력됨
                }]);
                
                setUser(data);
                setView('dashboard');
            };

            // 3초마다 학생 위치 업데이트
            useEffect(() => {
                if (view !== 'dashboard') return;

                const moveInterval = setInterval(() => {
                    setStudents(prev => prev.map(s => {
                        const nextLat = s.lat + s.dir.lat;
                        const nextLng = s.lng + s.dir.lng;
                        const nextPos = new window.kakao.maps.LatLng(nextLat, nextLng);

                        if (!markersRef.current[s.id]) {
                            const markerImg = `data:image/svg+xml;base64,${btoa(`
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="12" cy="12" r="8" fill="${s.color}" stroke="white" stroke-width="3"/>
                                </svg>
                            `)}`;
                            const imageSize = new window.kakao.maps.Size(24, 24);
                            const markerImage = new window.kakao.maps.MarkerImage(markerImg, imageSize);

                            markersRef.current[s.id] = new window.kakao.maps.Marker({
                                position: nextPos,
                                image: markerImage,
                                map: mapRef.current
                            });

                            overlaysRef.current[s.id] = new window.kakao.maps.CustomOverlay({
                                position: nextPos,
                                content: `<div class="student-label" style="background:${s.color}">${s.name}</div>`,
                                yAnchor: 1,
                                map: mapRef.current
                            });
                        } else {
                            markersRef.current[s.id].setPosition(nextPos);
                            overlaysRef.current[s.id].setPosition(nextPos);
                        }

                        return { ...s, lat: nextLat, lng: nextLng, path: [...s.path, nextPos] };
                    }));
                }, 3000);

                return () => clearInterval(moveInterval);
            }, [view]);

            // 경로 표시
            useEffect(() => {
                if (!mapRef.current) return;
                if (polylineRef.current) polylineRef.current.setMap(null);

                if (selectedStudentId) {
                    const student = students.find(s => s.id === selectedStudentId);
                    if (student && student.path.length > 0) {
                        polylineRef.current = new window.kakao.maps.Polyline({
                            path: student.path,
                            strokeWeight: 4,
                            strokeColor: student.color,
                            strokeOpacity: 0.8,
                            strokeStyle: 'dashed'
                        });
                        polylineRef.current.setMap(mapRef.current);
                    }
                }
            }, [students, selectedStudentId]);

            useEffect(() => {
                if (view === 'dashboard') setTimeout(initMap, 100);
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg p-6 font-sans">
                        <div className="bg-white/70 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white w-full max-w-sm">
                            <div className="text-center mb-10">
                                <div className="inline-flex items-center justify-center w-16 h-16 bg-slate-900 rounded-2xl mb-4 shadow-lg shadow-slate-200">
                                    <LucideIcon name="shield-check" size={32} className="text-white" />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter">EYE-LINK</h2>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-[0.2em]">Student Monitoring System</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-wider">Administrator ID</label>
                                    <input className="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900 transition-all font-medium" placeholder="아이디를 입력하세요" value={loginInfo.id} onChange={e => setLoginInfo({...loginInfo, id: e.target.value})} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase tracking-wider">Password</label>
                                    <input type="password" className="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900 transition-all font-medium" placeholder="비밀번호를 입력하세요" value={loginInfo.pw} onChange={e => setLoginInfo({...loginInfo, pw: e.target.value})} required />
                                </div>
                                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all shadow-xl shadow-slate-200 mt-4 active:scale-[0.98]">
                                    로그인
                                </button>
                            </form>
                            
                            <div className="mt-8 text-center">
                                <p className="text-[11px] text-slate-400 font-medium">관리자 전용 시스템입니다.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-50">
                    <header className="h-14 border-b flex items-center justify-between px-6 bg-white shrink-0 z-10">
                        <div className="flex items-center gap-2">
                            <div className="w-6 h-6 bg-slate-900 rounded flex items-center justify-center">
                                <LucideIcon name="shield" size={12} className="text-white" />
                            </div>
                            <span className="font-black text-lg tracking-tighter">EYE-LINK MONITORING</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex flex-col items-end">
                                <span className="text-xs font-bold text-slate-900">{user?.user_name} 관리자</span>
                                <span className="text-[9px] text-slate-400 font-bold uppercase">{user?.user_school}</span>
                            </div>
                            <div className="h-8 w-[1px] bg-slate-100 mx-1"></div>
                            <button onClick={() => setView('login')} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                                <LucideIcon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-64 border-r flex flex-col bg-white shrink-0">
                            <div className="p-4 border-b bg-slate-50/50 flex items-center justify-between">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">학생 실시간 목록</h3>
                                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-1.5">
                                {students.map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={() => setSelectedStudentId(s.id)}
                                        className={`w-full flex items-center gap-3 p-4 rounded-2xl transition-all border ${selectedStudentId === s.id ? 'bg-slate-900 border-slate-900 text-white shadow-lg shadow-slate-200' : 'bg-white border-slate-100 hover:border-slate-300 hover:bg-slate-50'}`}
                                    >
                                        <div className="w-2.5 h-2.5 rounded-full shadow-inner" style={{ backgroundColor: s.color }}></div>
                                        <span className="text-sm font-bold tracking-tight">{s.name}</span>
                                        {selectedStudentId === s.id && <LucideIcon name="chevron-right" size={14} className="ml-auto opacity-50" />}
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <div className="flex-1 relative">
                            <div id="map"></div>
                            <div className="absolute top-4 left-4 flex flex-col gap-2 z-10">
                                <div className="bg-white shadow-xl px-4 py-2 rounded-2xl border border-slate-100 flex items-center gap-2">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-[11px] font-bold text-slate-600 uppercase tracking-tight">Live Tracking Active</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
