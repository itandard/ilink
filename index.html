<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 카카오맵 API (본인 키 사용) -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; min-height: 400px; background-color: #f8fafc; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Lucide 아이콘 컴포넌트
        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // view: 'login' | 'signup' | 'dashboard'
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // 입력 폼 상태
            const [formData, setFormData] = useState({
                userId: '',
                password: '',
                userName: '',
                schoolName: ''
            });

            const mapRef = useRef(null);

            // 회원가입 (RPC 호출)
            const handleSignUp = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase.rpc('fn_insert_user', {
                        p_user_id: formData.userId,
                        p_user_pw: formData.password,
                        p_user_name: formData.userName,
                        p_user_school: formData.schoolName
                    });
                    
                    if (error) {
                        if (error.message.includes('ALREADY_EXISTS')) throw new Error("이미 존재하는 아이디입니다.");
                        throw error;
                    }
                    
                    alert("관리자 등록 성공! 로그인 해주세요.");
                    setView('login'); // 성공 후 로그인 화면으로 전환 (SPA 리다이렉션)
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // 로그인
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', formData.userId)
                        .eq('user_pw', formData.password)
                        .maybeSingle();

                    if (error) throw error;
                    if (!data) throw new Error("정보가 일치하지 않습니다.");

                    setUser(data);
                    setView('dashboard'); // 메인 화면으로 전환
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // 지도 초기화
            useEffect(() => {
                if (view !== 'dashboard') return;
                const timer = setTimeout(() => {
                    if (window.kakao && window.kakao.maps) {
                        window.kakao.maps.load(() => {
                            const container = document.getElementById('map');
                            if (!container) return;
                            const options = { center: new window.kakao.maps.LatLng(35.190360, 128.815600), level: 4 };
                            mapRef.current = new window.kakao.maps.Map(container, options);
                        });
                    }
                }, 100);
                return () => clearTimeout(timer);
            }, [view]);

            // 공통 입력 필드 변경 함수
            const handleChange = (e) => {
                const { id, value } = e.target;
                setFormData(prev => ({ ...prev, [id]: value }));
            };

            // 1. 로그인 뷰
            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f8fafc] p-6 animate-fade-in">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-10 border border-slate-200 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-4 shadow-sm">
                                    <LucideIcon name="shield-check" size={32} />
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tight">관제 시스템 로그인</h2>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-widest">ID</label>
                                    <input type="text" id="userId" placeholder="아이디" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" value={formData.userId} onChange={handleChange} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-widest">Password</label>
                                    <input type="password" id="password" placeholder="••••••••" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={formData.password} onChange={handleChange} required />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg active:scale-[0.98]">
                                    {loading ? '로그인 중...' : '접속하기'}
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <button onClick={() => setView('signup')} className="text-sm text-indigo-600 font-bold hover:underline underline-offset-4">신규 관리자 등록</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 2. 회원가입 뷰
            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-6 animate-fade-in">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-xl p-10 border border-slate-200 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-slate-800"></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2 text-center tracking-tight">관리자 등록</h2>
                            <p className="text-slate-400 text-center text-xs mb-8 font-medium">관리자 권한을 생성합니다.</p>
                            
                            <form onSubmit={handleSignUp} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">이름</label>
                                    <input type="text" id="userName" placeholder="실명 입력" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={formData.userName} onChange={handleChange} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">아이디</label>
                                    <input type="text" id="userId" placeholder="아이디 설정" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={formData.userId} onChange={handleChange} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">비밀번호</label>
                                    <input type="password" id="password" placeholder="비밀번호 설정" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={formData.password} onChange={handleChange} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">학교명</label>
                                    <input type="text" id="schoolName" placeholder="소속 학교명" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={formData.schoolName} onChange={handleChange} required />
                                </div>

                                <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-6 hover:bg-black transition-all shadow-xl active:scale-[0.98]">
                                    {loading ? '처리 중...' : '계정 생성하기'}
                                </button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-xs font-bold py-2 hover:text-slate-600">이미 계정이 있습니다</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // 3. 메인 대시보드 뷰
            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden animate-fade-in">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-8 bg-white shrink-0 z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100"><LucideIcon name="satellite" size={20} /></div>
                            <h1 className="font-black text-slate-800 text-lg tracking-tighter uppercase">GPS Control</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <div className="text-xs font-bold text-slate-800">{user?.user_name}님</div>
                                <div className="text-[10px] text-slate-400 font-medium uppercase tracking-tight">{user?.user_school}</div>
                            </div>
                            <button onClick={() => { setUser(null); setView('login'); }} className="text-rose-500 font-bold text-xs p-2 hover:bg-rose-50 rounded-lg transition-colors">로그아웃</button>
                        </div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-80 border-r border-slate-200 bg-white flex flex-col shrink-0">
                            <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                                <h2 className="font-bold text-slate-800 text-sm">관제 리스트</h2>
                                <span className="bg-emerald-100 text-emerald-600 text-[10px] font-black px-2 py-0.5 rounded-full">LIVE</span>
                            </div>
                            <div className="flex-1 overflow-y-auto">
                                <div className="p-5 border-b border-slate-50 bg-slate-50/50">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="font-bold text-sm text-slate-700">테스트 장비 01</span>
                                        <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                    </div>
                                    <p className="text-[11px] text-slate-400">마지막 수신: 방금 전</p>
                                </div>
                                <div className="p-8 text-center">
                                    <p className="text-xs text-slate-300 italic">추가 장비를 연결하세요</p>
                                </div>
                            </div>
                        </aside>
                        <main className="flex-1 relative">
                            <div id="map"></div>
                            <div className="absolute bottom-6 left-6 z-10 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-slate-200 w-64">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <LucideIcon name="database" size={14} /> Status
                                </h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs font-bold">
                                        <span className="text-slate-400">Lat</span>
                                        <span className="text-slate-700 font-mono">35.190360</span>
                                    </div>
                                    <div className="flex justify-between text-xs font-bold">
                                        <span className="text-slate-400">Lng</span>
                                        <span className="text-slate-700 font-mono">128.815600</span>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
