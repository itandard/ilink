<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // 중요: 본인의 정보를 입력하세요.
        const SUPABASE_URL = ""; 
        const SUPABASE_ANON_KEY = "";
        const KAKAO_MAP_KEY = "173d252d4d96821fe2235b962120637b"; // JavaScript 키인지 확인!
        const APP_ID = 'gps-tracker-app';

        const App = () => {
            const [supabase, setSupabase] = useState(null);
            const [lat, setLat] = useState('35.190360'); 
            const [lng, setLng] = useState('128.815600'); 
            const [lastGps, setLastGps] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [mapLoaded, setMapLoaded] = useState(false);
            const [mapError, setMapError] = useState(null);

            const mapRef = useRef(null);
            const kakaoMapInstance = useRef(null);
            const kakaoMarkerInstance = useRef(null);

            useEffect(() => {
                if (window.supabase && SUPABASE_URL) {
                    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    setSupabase(client);
                }
            }, []);

            const initMap = () => {
                if (!mapRef.current) return;
                
                // 카카오 객체 존재 여부 확인
                if (!window.kakao || !window.kakao.maps) {
                    setMapError("카카오 API 라이브러리가 로드되지 않았습니다. 키와 도메인 설정을 확인하세요.");
                    return;
                }

                window.kakao.maps.load(() => {
                    try {
                        const container = mapRef.current;
                        const options = {
                            center: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)),
                            level: 3
                        };
                        const map = new window.kakao.maps.Map(container, options);
                        kakaoMapInstance.current = map;

                        const marker = new window.kakao.maps.Marker({
                            position: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng))
                        });
                        marker.setMap(map);
                        kakaoMarkerInstance.current = marker;
                        
                        setMapLoaded(true);
                        setMapError(null);
                    } catch (e) {
                        setMapError("지도 생성 중 에러 발생: " + e.message);
                    }
                });
            };

            useEffect(() => {
                // 기존 스크립트 제거 후 재삽입 (강제 새로고침 효과)
                const existingScript = document.getElementById('kakao-map-script');
                if (existingScript) existingScript.remove();

                const script = document.createElement('script');
                script.id = 'kakao-map-script';
                script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_MAP_KEY}&autoload=false`;
                script.async = true;
                script.onload = initMap;
                script.onerror = () => setMapError("네트워크 오류 또는 잘못된 API 키입니다.");
                document.head.appendChild(script);
            }, []);

            const updateMap = (newLat, newLng) => {
                if (kakaoMapInstance.current) {
                    const loc = new window.kakao.maps.LatLng(newLat, newLng);
                    kakaoMapInstance.current.panTo(loc);
                    if (kakaoMarkerInstance.current) kakaoMarkerInstance.current.setPosition(loc);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden text-slate-900 bg-slate-50">
                    <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm z-30">
                        <div className="flex items-center gap-3">
                            <div className="bg-yellow-400 p-2 rounded-xl text-slate-900 shadow-sm">
                                <Icon name="map" />
                            </div>
                            <h1 className="text-xl font-black tracking-tight">GPS TRACKER</h1>
                        </div>
                        <button onClick={() => window.location.reload()} className="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-full text-xs font-bold transition-all active:scale-95 border border-slate-200 flex items-center gap-2">
                            <Icon name="refresh-ccw" size={14} /> 시스템 재시작
                        </button>
                    </header>

                    <main className="flex-1 relative flex flex-col">
                        {/* Map Area */}
                        <div ref={mapRef} className="flex-1 w-full bg-slate-200 relative">
                            {mapError && (
                                <div className="absolute inset-0 z-20 flex items-center justify-center bg-slate-900/10 backdrop-blur-[2px] p-6">
                                    <div className="bg-white p-8 rounded-3xl shadow-2xl border border-red-100 max-w-md w-full text-center animate-in zoom-in-95 duration-300">
                                        <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <Icon name="shield-alert" size={32} />
                                        </div>
                                        <h2 className="text-xl font-bold text-slate-800 mb-2">인증 오류 발생</h2>
                                        <p className="text-sm text-slate-500 mb-6">{mapError}</p>
                                        
                                        <div className="bg-slate-50 rounded-2xl p-4 mb-6 text-left border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-2">카카오 설정에 등록할 도메인</p>
                                            <code className="text-xs font-mono font-bold text-blue-600 break-all select-all">
                                                {window.location.origin}
                                            </code>
                                        </div>

                                        <a href="https://developers.kakao.com/console/app" target="_blank" className="block w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors mb-2 text-sm">
                                            카카오 개발자 콘솔 가기
                                        </a>
                                        <p className="text-[10px] text-slate-400">도메인 등록 후 최대 1~5분 정도 소요될 수 있습니다.</p>
                                    </div>
                                </div>
                            )}
                            {!mapLoaded && !mapError && (
                                <div className="absolute inset-0 flex items-center justify-center bg-slate-100 z-10">
                                    <div className="flex flex-col items-center">
                                        <div className="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
                                        <p className="text-sm font-bold text-slate-400">지도를 연결하고 있습니다...</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Control & Data Overlay */}
                        <div className="absolute bottom-6 left-6 right-6 md:right-auto md:w-80 z-30 flex flex-col gap-4">
                            {/* Input Card */}
                            <div className="bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-slate-200">
                                <h3 className="text-xs font-black text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-widest">
                                    <Icon name="navigation" size={14} className="text-yellow-500" />
                                    Manual Control
                                </h3>
                                <div className="space-y-3 mb-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-1">LATITUDE</label>
                                            <input type="number" value={lat} onChange={e=>setLat(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-mono font-bold focus:ring-2 focus:ring-yellow-400 outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-1">LONGITUDE</label>
                                            <input type="number" value={lng} onChange={e=>setLng(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-mono font-bold focus:ring-2 focus:ring-yellow-400 outline-none" />
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => updateMap(parseFloat(lat), parseFloat(lng))}
                                        className="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold py-2.5 rounded-xl text-xs transition-all active:scale-[0.98] shadow-lg shadow-yellow-100"
                                    >
                                        위치 테스트
                                    </button>
                                </div>
                            </div>

                            {/* Status Card */}
                            <div className="bg-slate-900 text-white p-5 rounded-2xl shadow-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">System Status</h3>
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-slate-400">최근 좌표</span>
                                        <span className="font-mono font-bold text-yellow-400">{parseFloat(lat).toFixed(4)}, {parseFloat(lng).toFixed(4)}</span>
                                    </div>
                                    <div className="flex justify-between text-xs">
                                        <span className="text-slate-400">데이터 소스</span>
                                        <span className="font-bold">Manual/Local</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
