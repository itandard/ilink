<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        .map-error-overlay {
            position: absolute;
            inset: 0;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .info-window {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            font-family: 'Pretendard', sans-serif;
            border-radius: 8px;
        }
        /* 입력 폼 포커스 애니메이션 */
        .input-focus {
            transition: all 0.2s ease-in-out;
        }
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); // 'login', 'signup', 'dashboard'
            const [user, setUser] = useState(null);
            const [mapError, setMapError] = useState(null);
            const [isMapLoaded, setIsMapLoaded] = useState(false);
            
            // 지도 관련 Ref
            const mapRef = useRef(null);
            const markerRef = useRef(null);
            const polylineRef = useRef(null);
            const infoWindowRef = useRef(null);
            const pathPointsRef = useRef([]); // 이동 경로 좌표 저장용

            // 폼 상태
            const [loginData, setLoginData] = useState({ userId: '', password: '' });
            const [signupData, setSignupData] = useState({ userId: '', password: '', name: '', school: '' });
            const [gpsInput, setGpsInput] = useState({ lat: '35.190360', lng: '128.815600' });
            const [isSending, setIsSending] = useState(false);

            // 지도 초기화
            const initMap = () => {
                if (typeof window.kakao === 'undefined') {
                    setMapError("Kakao SDK 로드 실패");
                    return;
                }

                window.kakao.maps.load(() => {
                    try {
                        const container = document.getElementById('map');
                        const initialPos = new window.kakao.maps.LatLng(parseFloat(gpsInput.lat), parseFloat(gpsInput.lng));
                        
                        const options = {
                            center: initialPos,
                            level: 3
                        };
                        const map = new window.kakao.maps.Map(container, options);
                        mapRef.current = map;
                        
                        // 마커 설정
                        const marker = new window.kakao.maps.Marker({ position: initialPos });
                        marker.setMap(map);
                        markerRef.current = marker;

                        // 이동 경로(Polyline) 설정
                        const polyline = new window.kakao.maps.Polyline({
                            path: [initialPos], // 초기 위치부터 시작
                            strokeWeight: 5,
                            strokeColor: '#4f46e5',
                            strokeOpacity: 0.7,
                            strokeStyle: 'solid'
                        });
                        polyline.setMap(map);
                        polylineRef.current = polyline;
                        pathPointsRef.current = [initialPos];

                        // 인포윈도우 설정
                        const infowindow = new window.kakao.maps.InfoWindow({ zIndex: 1 });
                        infoWindowRef.current = infowindow;

                        // 마우스 이벤트
                        window.kakao.maps.event.addListener(map, 'mousemove', (mouseEvent) => {
                            const latlng = mouseEvent.latLng;
                            infowindow.setContent(`
                                <div class="info-window">
                                    <div style="font-weight:bold; color:#4f46e5;">좌표 확인</div>
                                    <div>위도: ${latlng.getLat().toFixed(6)}</div>
                                    <div>경도: ${latlng.getLng().toFixed(6)}</div>
                                </div>
                            `);
                            infowindow.setPosition(latlng);
                            infowindow.open(map);
                        });
                        window.kakao.maps.event.addListener(map, 'mouseout', () => infowindow.close());

                        setIsMapLoaded(true);
                    } catch (err) {
                        setMapError(err.message);
                    }
                });
            };

            useEffect(() => {
                if (view === 'dashboard') {
                    setTimeout(initMap, 100);
                }
            }, [view]);

            // 위치 업데이트 (경로 추가)
            const updateLocation = async () => {
                if (!mapRef.current || !markerRef.current || !polylineRef.current) return;

                const newLat = parseFloat(gpsInput.lat);
                const newLng = parseFloat(gpsInput.lng);
                const newPos = new window.kakao.maps.LatLng(newLat, newLng);

                // 1. 지도 및 마커 이동
                mapRef.current.panTo(newPos);
                markerRef.current.setPosition(newPos);

                // 2. 경로 선(Polyline) 업데이트
                const newPath = [...pathPointsRef.current, newPos];
                pathPointsRef.current = newPath;
                polylineRef.current.setPath(newPath);

                // 3. DB 전송
                setIsSending(true);
                try {
                    await supabase.from('gps_logs').insert([{ 
                        device_id: 'WEB_CONTROL', 
                        latitude: newLat, 
                        longitude: newLng,
                        user_id: user?.user_id 
                    }]);
                } finally {
                    setIsSending(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const { data } = await supabase.from('t_user').select('*').eq('user_id', loginData.userId).eq('user_pw', loginData.password).maybeSingle();
                if (data) { setUser(data); setView('dashboard'); } 
                else { alert("정보가 일치하지 않습니다."); }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: signupData.userId,
                    p_user_pw: signupData.password,
                    p_user_name: signupData.name,
                    p_user_school: signupData.school
                });
                if (error) alert("이미 존재하는 아이디입니다.");
                else { alert("가입 완료!"); setView('login'); }
            };

            // --- 뷰 렌더링 ---

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-4 bg-indigo-50 rounded-3xl text-indigo-600 mb-4">
                                    <LucideIcon name="shield-check" size={32} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">GPS 관제 시스템</h2>
                                <p className="text-slate-400 text-sm mt-2">관리자 계정으로 로그인하세요</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 input-focus"
                                    placeholder="아이디"
                                    value={loginData.userId}
                                    onChange={(e) => setLoginData({...loginData, userId: e.target.value})}
                                    required
                                />
                                <input 
                                    type="password"
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 input-focus"
                                    placeholder="비밀번호"
                                    value={loginData.password}
                                    onChange={(e) => setLoginData({...loginData, password: e.target.value})}
                                    required
                                />
                                <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">
                                    로그인
                                </button>
                                <button type="button" onClick={() => setView('signup')} className="w-full text-slate-400 text-sm font-semibold py-2 hover:text-indigo-600">
                                    신규 관리자 등록하기
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <h2 className="text-2xl font-black text-slate-800 mb-8 text-center">관리자 계정 생성</h2>
                            <form onSubmit={handleSignup} className="space-y-4">
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="이름" onChange={(e) => setSignupData({...signupData, name: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="아이디" onChange={(e) => setSignupData({...signupData, userId: e.target.value})} required />
                                <input type="password" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="비밀번호" onChange={(e) => setSignupData({...signupData, password: e.target.value})} required />
                                <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="소속 학교" onChange={(e) => setSignupData({...signupData, school: e.target.value})} required />
                                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl mt-4 hover:bg-black transition-all shadow-xl active:scale-95">가입하기</button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-sm font-semibold py-2">뒤로 가기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-white">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white z-20">
                        <div className="flex items-center gap-2">
                            <LucideIcon name="map-pin" className="text-indigo-600" />
                            <h1 className="font-black text-slate-800 tracking-tighter">GPS DASHBOARD</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-[10px] font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full uppercase">
                                {user?.user_school} · {user?.user_name} 관리자
                            </div>
                            <button onClick={() => setView('login')} className="text-slate-300 hover:text-rose-500 transition-colors">
                                <LucideIcon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 relative">
                        <div id="map"></div>
                        
                        {/* 좌표 컨트롤 패널 */}
                        <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 w-full max-w-2xl px-6">
                            <div className="bg-white/90 backdrop-blur-xl p-6 rounded-[2rem] shadow-2xl border border-white/20 flex flex-col md:flex-row items-end gap-4">
                                <div className="flex-1 grid grid-cols-2 gap-4 w-full">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Latitude</label>
                                        <input type="number" step="0.000001" className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono" value={gpsInput.lat} onChange={(e) => setGpsInput({...gpsInput, lat: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Longitude</label>
                                        <input type="number" step="0.000001" className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono" value={gpsInput.lng} onChange={(e) => setGpsInput({...gpsInput, lng: e.target.value})} />
                                    </div>
                                </div>
                                <button 
                                    onClick={updateLocation}
                                    disabled={isSending}
                                    className="bg-indigo-600 text-white px-8 py-3.5 rounded-2xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2 active:scale-95 disabled:opacity-50"
                                >
                                    <LucideIcon name="navigation" size={16} />
                                    이동 및 기록
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
