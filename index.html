<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트 래퍼 (Lucide 사용)
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SUPABASE_URL = ""; 
        const SUPABASE_ANON_KEY = "";
        const KAKAO_MAP_KEY = "173d252d4d96821fe2235b962120637b"; 
        const APP_ID = 'gps-tracker-app';

        const App = () => {
            const [supabase, setSupabase] = useState(null);
            const [user, setUser] = useState(null);
            const [lat, setLat] = useState('35.190360'); 
            const [lng, setLng] = useState('128.815600'); 
            const [lastGps, setLastGps] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            const [error, setError] = useState(null);
            const [countdown, setCountdown] = useState(10);
            const [mapLoaded, setMapLoaded] = useState(false);

            const mapRef = useRef(null);
            const kakaoMapInstance = useRef(null);
            const kakaoMarkerInstance = useRef(null);

            // Supabase 초기화
            useEffect(() => {
                if (window.supabase && SUPABASE_URL) {
                    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    setSupabase(client);
                    client.auth.signInAnonymously().then(({data}) => setUser(data.user));
                }
            }, []);

            // 카카오맵 초기화
            const initMap = () => {
                if (!mapRef.current || !window.kakao || !window.kakao.maps) return;
                
                window.kakao.maps.load(() => {
                    const container = mapRef.current;
                    const options = {
                        center: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)),
                        level: 3
                    };
                    const map = new window.kakao.maps.Map(container, options);
                    kakaoMapInstance.current = map;

                    const marker = new window.kakao.maps.Marker({
                        position: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng))
                    });
                    marker.setMap(map);
                    kakaoMarkerInstance.current = marker;
                    setMapLoaded(true);
                });
            };

            useEffect(() => {
                const script = document.createElement('script');
                script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_MAP_KEY}&autoload=false`;
                script.async = true;
                script.onload = initMap;
                document.head.appendChild(script);
            }, []);

            // 데이터 전송
            const sendGpsData = async () => {
                if (!supabase) {
                    setError("Supabase URL/Key가 설정되지 않았습니다.");
                    return;
                }
                setIsLoading(true);
                try {
                    const targetLat = parseFloat(lat);
                    const targetLng = parseFloat(lng);
                    await supabase.from(`gps_logs`).insert([{ latitude: targetLat, longitude: targetLng }]);
                    setIsSuccess(true);
                    updateMap(targetLat, targetLng);
                    setLastGps({ latitude: targetLat, longitude: targetLng, created_at: new Date().toISOString() });
                    setTimeout(() => setIsSuccess(false), 2000);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const updateMap = (newLat, newLng) => {
                if (kakaoMapInstance.current) {
                    const loc = new window.kakao.maps.LatLng(newLat, newLng);
                    kakaoMapInstance.current.panTo(loc);
                    kakaoMarkerInstance.current.setPosition(loc);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm z-20">
                        <div className="flex items-center gap-3">
                            <div className="bg-yellow-400 p-2 rounded-lg"><Icon name="map-pin" /></div>
                            <h1 className="text-xl font-bold">카카오맵 GPS 관제</h1>
                        </div>
                        <button onClick={() => window.location.reload()} className="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full text-xs font-bold">
                            <Icon name="refresh-cw" size={14} className={isLoading ? "animate-spin" : ""} /> 새로고침
                        </button>
                    </header>

                    <section className="p-4 bg-white border-b z-10">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-3">
                            <div className="flex-1 grid grid-cols-2 gap-3">
                                <input type="number" value={lat} onChange={e => setLat(e.target.value)} className="border p-2 rounded-xl text-sm font-mono" placeholder="위도" />
                                <input type="number" value={lng} onChange={e => setLng(e.target.value)} className="border p-2 rounded-xl text-sm font-mono" placeholder="경도" />
                            </div>
                            <button onClick={sendGpsData} className="bg-yellow-400 px-6 py-2 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                                {isSuccess ? "전송 완료" : "좌표 전송"}
                            </button>
                        </div>
                    </section>

                    <div className="flex-1 relative">
                        <div ref={mapRef} className="w-full h-full bg-slate-200">
                            {!mapLoaded && <div className="flex h-full items-center justify-center text-slate-400 text-sm">카카오맵 로딩 중... 도메인 설정을 확인하세요.</div>}
                        </div>
                        <div className="absolute bottom-6 left-6 z-10 w-64 bg-white/90 backdrop-blur p-4 rounded-2xl shadow-xl border">
                            <h3 className="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">최신 수신 정보</h3>
                            {lastGps ? (
                                <div className="space-y-1">
                                    <div className="flex justify-between text-sm"><span className="text-slate-400">LAT</span><span className="font-bold font-mono">{parseFloat(lastGps.latitude).toFixed(6)}</span></div>
                                    <div className="flex justify-between text-sm"><span className="text-slate-400">LNG</span><span className="font-bold font-mono">{parseFloat(lastGps.longitude).toFixed(6)}</span></div>
                                </div>
                            ) : <p className="text-xs italic text-slate-300 text-center">데이터 없음</p>}
                            {error && <p className="text-[10px] text-red-500 mt-2">{error}</p>}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
