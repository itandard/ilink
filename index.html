<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 카카오 통합 SDK v2 (최신 가이드 반영) -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" xintegrity="sha384-lXpv9YfCcG68YvTHp/+S80vSdfE86vS5J60T8PZ1V98+Y06+rW6aWvG4h18D8C57" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // 1. 본인의 JavaScript 키를 입력하세요.
        const KAKAO_MAP_KEY = "173d252d4d96821fe2235b962120637b"; 

        const App = () => {
            const [lat, setLat] = useState('35.190360'); 
            const [lng, setLng] = useState('128.815600'); 
            const [mapLoaded, setMapLoaded] = useState(false);
            const [mapError, setMapError] = useState(null);
            const [authStatus, setAuthStatus] = useState("Checking...");

            const mapRef = useRef(null);
            const kakaoMapInstance = useRef(null);
            const kakaoMarkerInstance = useRef(null);

            // 지도 초기화 함수
            const initMap = () => {
                if (!mapRef.current) return;
                
                // window.kakao.maps 객체 존재 확인
                if (typeof window.kakao === 'undefined' || !window.kakao.maps) {
                    setMapError("지도 SDK 로드 실패: 도메인 등록을 확인하세요.");
                    return;
                }

                window.kakao.maps.load(() => {
                    try {
                        const container = mapRef.current;
                        const options = {
                            center: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)),
                            level: 3
                        };
                        const map = new window.kakao.maps.Map(container, options);
                        kakaoMapInstance.current = map;

                        const marker = new window.kakao.maps.Marker({
                            position: new window.kakao.maps.LatLng(parseFloat(lat), parseFloat(lng))
                        });
                        marker.setMap(map);
                        kakaoMarkerInstance.current = marker;
                        
                        setMapLoaded(true);
                        setMapError(null);
                    } catch (e) {
                        setMapError("지도 생성 중 에러: " + e.message);
                    }
                });
            };

            useEffect(() => {
                // 1. Kakao SDK 초기화 (공식 가이드 반영)
                try {
                    if (window.Kakao) {
                        if (!window.Kakao.isInitialized()) {
                            window.Kakao.init(KAKAO_MAP_KEY);
                        }
                        const isOk = window.Kakao.isInitialized();
                        setAuthStatus(isOk ? "Initialized" : "Failed");
                        console.log("Kakao SDK Init Status:", isOk);
                    }
                } catch (err) {
                    setMapError("SDK 초기화 에러: " + err.message);
                }

                // 2. 지도 SDK 동적 로드
                const script = document.createElement('script');
                script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_MAP_KEY}&autoload=false`;
                script.async = true;
                script.onload = initMap;
                script.onerror = () => setMapError("네트워크 오류: 지도 스크립트를 불러올 수 없습니다.");
                document.head.appendChild(script);
            }, []);

            return (
                <div className="flex flex-col h-screen bg-slate-900 text-white">
                    <header className="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-yellow-400 p-2 rounded-lg text-slate-900 animate-pulse"><Icon name="radio" /></div>
                            <h1 className="text-xl font-black italic tracking-tighter">GPS LIVE</h1>
                        </div>
                        <div className="flex flex-col items-end gap-1">
                            <div className="text-[10px] bg-slate-800 px-3 py-1 rounded-full border border-slate-700 font-mono text-slate-400">
                                DOMAIN: {window.location.hostname}
                            </div>
                            <div className={`text-[9px] font-bold px-2 py-0.5 rounded ${authStatus === 'Initialized' ? 'text-emerald-400 bg-emerald-950' : 'text-red-400 bg-red-950'}`}>
                                SDK AUTH: {authStatus}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 relative">
                        <div ref={mapRef} className="w-full h-full grayscale-[0.1]">
                            {mapError && (
                                <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-8 text-center">
                                    <div className="max-w-md w-full bg-slate-900 border border-red-900/50 p-8 rounded-3xl shadow-2xl">
                                        <div className="w-20 h-20 bg-red-900/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-900/30">
                                            <Icon name="shield-off" size={40} />
                                        </div>
                                        <h2 className="text-2xl font-bold mb-2 text-red-400">연결 보안 오류</h2>
                                        <p className="text-sm text-slate-400 mb-8 leading-relaxed">
                                            카카오 서버가 요청을 거부했습니다.<br/>
                                            키 값이 <b>JavaScript 키</b>가 맞는지,<br/>
                                            아래 도메인이 <b>[내 애플리케이션 > 플랫폼]</b>에<br/>
                                            정확히 등록되었는지 확인하세요.
                                        </p>
                                        
                                        <div className="bg-black/50 p-4 rounded-2xl mb-8 text-left border border-slate-800">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-2">카카오 등록 필수 주소</p>
                                            <code className="text-xs font-mono font-bold text-yellow-500 break-all select-all">{window.location.origin}</code>
                                        </div>

                                        <button onClick={() => window.location.reload()} className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-slate-200 transition-all">
                                            설정 확인 후 재시도
                                        </button>
                                    </div>
                                </div>
                            )}
                            {!mapLoaded && !mapError && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                                    <div className="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
                                    <p className="text-slate-400 font-bold animate-pulse text-sm">SECURITY HANDSHAKE...</p>
                                </div>
                            )}
                        </div>

                        {/* Status Overlay */}
                        <div className="absolute bottom-6 left-6 right-6 md:w-80 z-40">
                            <div className="bg-slate-900/80 backdrop-blur-xl p-6 rounded-3xl border border-slate-700 shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-[10px] font-black text-yellow-400 tracking-[0.2em]">GPS DATA</span>
                                    <span className="flex h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></span>
                                </div>
                                <div className="space-y-4 font-mono">
                                    <div>
                                        <label className="text-[9px] text-slate-500 block mb-1 uppercase tracking-widest">Latitude</label>
                                        <div className="text-xl font-bold tracking-tight">{parseFloat(lat).toFixed(6)}</div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] text-slate-500 block mb-1 uppercase tracking-widest">Longitude</label>
                                        <div className="text-xl font-bold tracking-tight">{parseFloat(lng).toFixed(6)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
