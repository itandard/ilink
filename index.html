<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; min-height: 400px; background-color: #f8fafc; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // 입력 필드 상태
            const [userId, setUserId] = useState('');
            const [password, setPassword] = useState('');
            const [userName, setUserName] = useState('');
            const [schoolName, setSchoolName] = useState('');

            // 에러 상태
            const [loginError, setLoginError] = useState('');
            const [regError, setRegError] = useState('');

            const [devices] = useState([
                { id: 1, name: "김민수 학생", lat: 35.190360, lng: 128.815600, status: "moving" },
                { id: 2, name: "이서연 학생", lat: 35.192360, lng: 128.818600, status: "idle" }
            ]);
            
            const mapRef = useRef(null);

            // 회원가입 처리
            const handleSignUp = async (e) => {
                e.preventDefault();
                setLoading(true);
                setRegError('');
                try {
                    // SQL의 fn_insert_user RPC 함수 호출
                    const { data, error: rpcError } = await supabase.rpc('fn_insert_user', {
                        p_user_id: userId,
                        p_user_pw: password,
                        p_user_name: userName,
                        p_user_school: schoolName
                    });
                    
                    if (rpcError) {
                        if (rpcError.message.includes('ALREADY_EXISTS')) {
                            setRegError("이미 존재하는 아이디입니다.");
                        } else {
                            setRegError("등록 실패: " + rpcError.message);
                        }
                        return;
                    }
                    
                    alert("관리자 등록이 완료되었습니다.");
                    setView('login');
                    setUserId(''); setPassword(''); setUserName(''); setSchoolName('');
                } catch (err) { 
                    setRegError("서버 통신 중 오류가 발생했습니다.");
                } finally { 
                    setLoading(false); 
                }
            };

            // 로그인 처리
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setLoginError('');
                try {
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', userId)
                        .eq('user_pw', password)
                        .maybeSingle();

                    if (error) throw error;
                    if (!data) {
                        setLoginError("아이디 또는 비밀번호를 확인해주세요.");
                        return;
                    }

                    setUser(data);
                    setView('main');
                } catch (err) { 
                    setLoginError("로그인 처리 중 오류가 발생했습니다.");
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                if (view !== 'main') return;
                const timer = setTimeout(() => {
                    if (window.kakao && window.kakao.maps) {
                        window.kakao.maps.load(() => {
                            const container = document.getElementById('map');
                            if (!container) return;
                            const options = { center: new window.kakao.maps.LatLng(35.190360, 128.815600), level: 4 };
                            mapRef.current = new window.kakao.maps.Map(container, options);
                        });
                    }
                }, 100);
                return () => clearTimeout(timer);
            }, [view]);

            // 로그인 화면
            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-6">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200/60 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-4">
                                    <Icon name="shield-check" size={32} />
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tight">관제 시스템 로그인</h2>
                            </div>

                            {loginError && (
                                <div className="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 text-xs font-bold flex items-center gap-2 animate-shake">
                                    <Icon name="alert-circle" size={16} />
                                    {loginError}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-widest">ID</label>
                                    <input type="text" placeholder="아이디" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" value={userId} onChange={e => setUserId(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-widest">Password</label>
                                    <input type="password" placeholder="••••••••" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={password} onChange={e => setPassword(e.target.value)} required />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg active:scale-[0.98]">
                                    {loading ? '로그인 중...' : '접속하기'}
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <button onClick={() => { setView('signup'); setRegError(''); }} className="text-sm text-indigo-600 font-bold hover:underline">신규 관리자 등록</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 회원가입 화면 (요청하신 4행 구조)
            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-6">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200/60 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-slate-800"></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2 text-center tracking-tight">관리자 등록</h2>
                            <p className="text-slate-400 text-center text-xs mb-8 font-medium italic">순서대로 정보를 입력해 주세요.</p>
                            
                            {regError && (
                                <div className="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 text-xs font-bold flex items-center gap-2 animate-shake">
                                    <Icon name="alert-circle" size={16} />
                                    {regError}
                                </div>
                            )}

                            <form onSubmit={handleSignUp} className="space-y-4">
                                {/* 1. 이름 */}
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">이름</label>
                                    <div className="relative">
                                        <div className="absolute left-4 top-3.5 text-slate-300"><Icon name="user" size={16} /></div>
                                        <input type="text" placeholder="관리자 실명" className="w-full pl-11 pr-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={userName} onChange={e => setUserName(e.target.value)} required />
                                    </div>
                                </div>

                                {/* 2. 아이디 */}
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">아이디</label>
                                    <div className="relative">
                                        <div className="absolute left-4 top-3.5 text-slate-300"><Icon name="fingerprint" size={16} /></div>
                                        <input type="text" placeholder="사용할 ID" className="w-full pl-11 pr-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={userId} onChange={e => setUserId(e.target.value)} required />
                                    </div>
                                </div>

                                {/* 3. 비밀번호 */}
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">비밀번호</label>
                                    <div className="relative">
                                        <div className="absolute left-4 top-3.5 text-slate-300"><Icon name="lock" size={16} /></div>
                                        <input type="password" placeholder="비밀번호 설정" className="w-full pl-11 pr-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={password} onChange={e => setPassword(e.target.value)} required />
                                    </div>
                                </div>

                                {/* 4. 학교명 */}
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">학교명</label>
                                    <div className="relative">
                                        <div className="absolute left-4 top-3.5 text-slate-300"><Icon name="school" size={16} /></div>
                                        <input type="text" placeholder="소속 학교명" className="w-full pl-11 pr-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-slate-800 transition-all" value={schoolName} onChange={e => setSchoolName(e.target.value)} required />
                                    </div>
                                </div>

                                <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-6 hover:bg-black transition-all shadow-xl active:scale-[0.98] flex items-center justify-center gap-2">
                                    {loading ? '등록 중...' : <><Icon name="user-plus" size={18} /> 계정 생성</>}
                                </button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-xs font-bold py-2 hover:text-slate-600">이전으로 돌아가기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // 메인 관제 화면
            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-8 bg-white shrink-0 z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><Icon name="satellite" size={20} /></div>
                            <h1 className="font-black text-slate-800 text-lg tracking-tighter">GPS CONTROL CENTER</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <div className="text-xs font-bold text-slate-800">{user?.user_name} 관리자</div>
                                <div className="text-[10px] text-slate-400">{user?.user_school}</div>
                            </div>
                            <button onClick={() => setView('login')} className="text-rose-500 font-bold text-xs p-2 hover:bg-rose-50 rounded-lg">로그아웃</button>
                        </div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-80 border-r border-slate-200 bg-white flex flex-col shrink-0">
                            <div className="p-6 border-b border-slate-100"><h2 className="font-bold text-slate-800 text-sm">관제 대상</h2></div>
                            <div className="flex-1 overflow-y-auto">
                                {devices.map(d => (
                                    <div key={d.id} className="p-5 border-b border-slate-50 hover:bg-slate-50 cursor-pointer">
                                        <div className="flex justify-between items-center"><span className="font-bold text-sm text-slate-700">{d.name}</span></div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                        <main className="flex-1 relative"><div id="map"></div></main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
