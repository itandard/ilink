<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) | 안전 솔루션</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-refresh {
            animation: spin-slow 0.8s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [view, setView] = useState('login'); 
            const [activeTab, setActiveTab] = useState('map'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [gpsLogs, setGpsLogs] = useState([]);
            const [logsLoading, setLogsLoading] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            
            const [authForm, setAuthForm] = useState({ id: '', pw: '' });
            
            const mapInstance = useRef(null);
            const overlays = useRef({}); 
            const paths = useRef({});

            // Lucide 아이콘 초기화 함수
            const refreshIcons = () => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            };

            useEffect(() => {
                refreshIcons();
            }, [view, activeTab, gpsLogs, logsLoading, isRefreshing]);

            // GPS 로그 가져오기 함수 (전역 관리 위해 위로 이동)
            const fetchGpsLogs = async () => {
                setLogsLoading(true);
                setIsRefreshing(true);
                try {
                    const { data, error } = await supabase
                        .from('t_gps')
                        .select('*')
                        .order('update_time', { ascending: false });
                    if (error) throw error;
                    setGpsLogs(data || []);
                } catch (err) {
                    console.error("데이터 로드 실패:", err);
                } finally {
                    setLogsLoading(false);
                    setTimeout(() => setIsRefreshing(false), 600);
                }
            };

            // 실시간 이동 시뮬레이션
            useEffect(() => {
                if (view === 'main' && students.length > 0 && activeTab === 'map') {
                    const moveInterval = setInterval(() => {
                        setStudents(prev => prev.map(s => {
                            const deltaLat = (Math.random() - 0.5) * 0.0004;
                            const deltaLng = (Math.random() - 0.5) * 0.0004;
                            const newLat = s.lat + deltaLat;
                            const newLng = s.lng + deltaLng;
                            
                            if (window.kakao && window.kakao.maps) {
                                const newPos = new window.kakao.maps.LatLng(newLat, newLng);
                                const newHistory = [...(s.history || []), newPos].slice(-100);
                                return { ...s, lat: newLat, lng: newLng, history: newHistory };
                            }
                            return s;
                        }));
                    }, 5000);
                    return () => clearInterval(moveInterval);
                }
            }, [view, students.length, activeTab]);

            // 지도 초기화
            useEffect(() => {
                if (view === 'main' && activeTab === 'map') {
                    const timer = setTimeout(() => {
                        const container = document.getElementById('map');
                        if (container && !mapInstance.current && window.kakao) {
                            const options = {
                                center: new window.kakao.maps.LatLng(35.2456, 128.6922),
                                level: 4
                            };
                            mapInstance.current = new window.kakao.maps.Map(container, options);
                            setStudents(prev => [...prev]); 
                        }
                    }, 100);
                    return () => clearTimeout(timer);
                }
            }, [view, activeTab]);

            // 마커 업데이트 로직 (생략 방지 위해 유지)
            useEffect(() => {
                if (mapInstance.current && students.length > 0 && activeTab === 'map') {
                    students.forEach(s => {
                        if (!s.lat || !s.lng) return;
                        const position = new window.kakao.maps.LatLng(s.lat, s.lng);
                        if (!overlays.current[s.id]) {
                            const content = document.createElement('div');
                            content.className = 'relative bottom-[45px] flex flex-col items-center';
                            content.innerHTML = `<div style="background-color: ${s.color}; padding: 4px 12px; border-radius: 20px; color: white; font-size: 12px; font-weight: 800; border: 2px solid white;">${s.name}</div>`;
                            overlays.current[s.id] = new window.kakao.maps.CustomOverlay({ position, content, map: mapInstance.current });
                        } else {
                            overlays.current[s.id].setPosition(position);
                            overlays.current[s.id].setMap(mapInstance.current);
                        }
                    });
                }
            }, [students, view, activeTab]);

            useEffect(() => {
                if (activeTab === 'logs') fetchGpsLogs();
            }, [activeTab]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase.from('t_user').select('*').eq('user_id', authForm.id).eq('user_pw', authForm.pw).single();
                    if (error || !data) { alert("로그인 정보를 확인해주세요."); return; }
                    const mockData = [
                        { stu_no: 'S001', stu_name: '김민준', lat: 35.2456, lng: 128.6922, color: '#EF4444' },
                        { stu_no: 'S002', stu_name: '이서윤', lat: 35.2465, lng: 128.6910, color: '#3B82F6' },
                        { stu_no: 'S003', stu_name: '박지호', lat: 35.2448, lng: 128.6935, color: '#10B981' }
                    ];
                    setStudents(mockData.map(s => ({ ...s, id: s.stu_no, name: s.stu_name, history: [new window.kakao.maps.LatLng(s.lat, s.lng)] })));
                    setUser(data);
                    setView('main');
                } catch (err) { alert("오류 발생"); } finally { setLoading(false); }
            };

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-100">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px] text-center border border-slate-200">
                            <h1 className="text-3xl font-black text-slate-900 mb-2 italic">Eye-Link</h1>
                            <p className="text-slate-400 text-sm mb-8">안전 관리 로그인</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold" placeholder="아이디" value={authForm.id} onChange={e => setAuthForm({...authForm, id: e.target.value})} required />
                                <input type="password" placeholder="비밀번호" className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold" value={authForm.pw} onChange={e => setAuthForm({...authForm, pw: e.target.value})} required />
                                <button className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">
                                    {loading ? "로그인 중..." : "로그인"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-slate-50">
                    {/* 상단 통합 헤더 - 새로고침 버튼을 여기로 배치 */}
                    <header className="h-20 bg-white border-b flex items-center justify-between px-8 z-[2000] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-xl text-white">
                                <i data-lucide="eye" className="w-6 h-6"></i>
                            </div>
                            <h2 className="font-black text-xl text-slate-900">Eye-Link Dashboard</h2>
                        </div>

                        {/* 메인 새로고침 버튼 (어디서든 보임) */}
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={fetchGpsLogs} 
                                disabled={isRefreshing}
                                className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-95 disabled:opacity-50"
                            >
                                <i data-lucide="refresh-cw" className={`w-4 h-4 ${isRefreshing ? 'animate-refresh' : ''}`}></i>
                                <span className="font-bold text-sm">{isRefreshing ? '데이터 수신 중...' : '데이터 새로고침'}</span>
                            </button>
                            
                            <div className="h-8 w-[1px] bg-slate-200 mx-2"></div>
                            
                            <div className="text-right hidden sm:block">
                                <p className="text-[10px] text-slate-400 font-bold">{user?.user_school}</p>
                                <p className="text-sm font-black text-slate-700">{user?.user_name} 관리자</p>
                            </div>
                            <button onClick={() => window.location.reload()} className="p-2.5 bg-slate-100 text-slate-400 rounded-lg hover:bg-red-50 hover:text-red-500 transition-all">
                                <i data-lucide="log-out" className="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>
                    
                    <div className="flex-1 flex overflow-hidden p-4 gap-4">
                        <aside className="w-72 bg-white rounded-[1.5rem] border border-slate-200 flex flex-col z-[1500] shadow-sm overflow-hidden">
                            <div className="p-2 flex gap-1 bg-slate-50 border-b">
                                <button onClick={() => setActiveTab('map')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === 'map' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>
                                    <i data-lucide="map" className="w-4 h-4"></i> 지도
                                </button>
                                <button onClick={() => setActiveTab('logs')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === 'logs' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>
                                    <i data-lucide="database" className="w-4 h-4"></i> 로그
                                </button>
                            </div>

                            <div className="p-4 border-b bg-white">
                                <h3 className="font-black text-slate-800 text-xs flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                                    모니터링 대상 ({students.length})
                                </h3>
                            </div>

                            <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scroll">
                                {students.map(s => (
                                    <div key={s.id} onClick={() => { setActiveTab('map'); focusStudent(s); }} className="p-3 bg-white border border-slate-100 rounded-xl flex items-center gap-3 hover:border-blue-400 transition-all cursor-pointer group">
                                        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm" style={{backgroundColor: s.color}}>
                                            {s.name.substring(0,1)}
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-sm font-black text-slate-800">{s.name}</span>
                                            <span className="text-[10px] text-slate-400">{s.id}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 relative bg-white rounded-[1.5rem] shadow-sm border border-slate-200 overflow-hidden">
                            {activeTab === 'map' ? (
                                <div className="h-full relative">
                                    <div id="map" className="w-full h-full"></div>
                                    <div className="absolute top-6 right-6 z-[1000] bg-white/90 backdrop-blur-md p-1.5 rounded-2xl shadow-xl flex flex-col gap-1 border border-white/20">
                                        <button className="p-3 hover:bg-slate-100 rounded-xl transition-all" onClick={() => mapInstance.current.zoomIn()}><i data-lucide="plus" className="w-5 h-5"></i></button>
                                        <button className="p-3 hover:bg-slate-100 rounded-xl transition-all" onClick={() => mapInstance.current.zoomOut()}><i data-lucide="minus" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col">
                                    <div className="p-6 border-b flex items-center gap-4 bg-white">
                                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl">
                                            <i data-lucide="table" className="w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-black text-slate-800">GPS 수신 데이터 히스토리</h2>
                                            <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Real-time DB Connection Active</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 overflow-auto p-6 custom-scroll bg-slate-50/30">
                                        <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                            <table className="w-full text-left border-separate border-spacing-0">
                                                <thead>
                                                    <tr className="bg-slate-50/80">
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-slate-400 uppercase text-center w-16">ID</th>
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-slate-400 uppercase">학번</th>
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-indigo-500 uppercase">위도</th>
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-indigo-500 uppercase">경도</th>
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-orange-500 uppercase text-center">위성 수</th>
                                                        <th className="px-6 py-4 border-b border-slate-100 text-[11px] font-black text-slate-600 uppercase">업데이트 시간</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50 text-sm">
                                                    {gpsLogs.length > 0 ? gpsLogs.map((log) => (
                                                        <tr key={log.id} className="hover:bg-indigo-50/30 transition-colors">
                                                            <td className="px-6 py-4 text-slate-300 text-xs text-center">{log.id}</td>
                                                            <td className="px-6 py-4 font-black text-slate-800">{log.stu_no}</td>
                                                            <td className="px-6 py-4 font-mono text-indigo-600">{Number(log.latitude).toFixed(6)}</td>
                                                            <td className="px-6 py-4 font-mono text-indigo-600">{Number(log.longitude).toFixed(6)}</td>
                                                            <td className="px-6 py-4 text-center">
                                                                <span className="inline-flex items-center gap-1 px-2.5 py-1 bg-orange-50 text-orange-600 rounded-lg text-[10px] font-black border border-orange-100">
                                                                    <i data-lucide="satellite" className="w-3 h-3"></i> {log.satellites}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 text-slate-500 font-medium">
                                                                <div className="flex items-center gap-2">
                                                                    <i data-lucide="clock" className="w-3.5 h-3.5 opacity-30"></i>
                                                                    {new Date(log.update_time).toLocaleString('ko-KR')}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )) : (
                                                        <tr>
                                                            <td colSpan="6" className="px-6 py-20 text-center text-slate-400 font-bold italic">
                                                                {logsLoading ? "데이터를 불러오는 중입니다..." : "데이터가 없습니다."}
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
