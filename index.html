<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        /* 공식 가이드: 지도를 담을 영역의 크기 지정 필수 */
        #map { width: 100%; height: 100%; background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // [체크] 발급받은 JavaScript 키를 여기에 넣으세요
        const KAKAO_APP_KEY = "173d252d4d96821fe2235b962120637b"; 

        const App = () => {
            const [pos, setPos] = useState({ lat: 35.190360, lng: 128.815600 });
            const [isLoaded, setIsLoaded] = useState(false);
            const [error, setError] = useState(null);
            
            const mapInstance = useRef(null);
            const markerInstance = useRef(null);

            useEffect(() => {
                // 1. 가이드 Step 2: API를 로딩하는 스크립트 태그 동적 생성
                const script = document.createElement('script');
                script.type = 'text/javascript';
                // autoload=false를 사용하여 로드 완료 시점을 명확히 제어
                script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false&libraries=services`;
                
                script.onload = () => {
                    // 2. 가이드 Step 3: 지도를 띄우는 코드 작성
                    window.kakao.maps.load(() => {
                        try {
                            const container = document.getElementById('map'); // 지도를 담을 영역의 DOM 레퍼런스
                            
                            const options = { // 지도를 생성할 때 필요한 기본 옵션
                                center: new window.kakao.maps.LatLng(pos.lat, pos.lng), // 지도의 중심좌표
                                level: 3 // 지도의 레벨(확대, 축소 정도)
                            };

                            // 지도 생성 및 객체 리턴
                            const map = new window.kakao.maps.Map(container, options);
                            mapInstance.current = map;

                            // 마커 추가
                            const marker = new window.kakao.maps.Marker({
                                position: new window.kakao.maps.LatLng(pos.lat, pos.lng)
                            });
                            marker.setMap(map);
                            markerInstance.current = marker;

                            setIsLoaded(true);
                            console.log("Kakao Map Successfully Initialized");
                        } catch (err) {
                            console.error("Map Init Error:", err);
                            setError("지도 초기화 중 에러가 발생했습니다.");
                        }
                    });
                };

                script.onerror = () => {
                    setError("카카오 지도 SDK 로드에 실패했습니다. 키와 도메인 설정을 확인하세요.");
                };

                document.head.appendChild(script);
                return () => {
                    if (document.head.contains(script)) {
                        document.head.removeChild(script);
                    }
                };
            }, []);

            const updateLocation = () => {
                if (mapInstance.current && markerInstance.current) {
                    const newLatLng = new window.kakao.maps.LatLng(pos.lat, pos.lng);
                    mapInstance.current.panTo(newLatLng);
                    markerInstance.current.setPosition(newLatLng);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-100">
                    {/* Header */}
                    <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                                <Icon name="map" size={20} />
                            </div>
                            <div>
                                <h1 className="text-sm font-black text-slate-800 uppercase tracking-tight">GPS Tracking System</h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Real-time Monitoring</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-black tracking-wider transition-colors ${isLoaded ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-rose-50 text-rose-600 border border-rose-100'}`}>
                                <span className={`w-1.5 h-1.5 rounded-full ${isLoaded ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-rose-500 animate-pulse'}`}></span>
                                {isLoaded ? 'SYSTEM ONLINE' : 'SYSTEM OFFLINE'}
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="flex-1 flex overflow-hidden relative">
                        {/* Map View Area */}
                        <main className="flex-1 relative bg-slate-200">
                            <div id="map"></div>
                            
                            {/* Error Overlay */}
                            {error && (
                                <div className="absolute inset-0 z-[100] bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-8">
                                    <div className="max-w-md w-full bg-white rounded-3xl p-8 text-center shadow-2xl border border-white/20">
                                        <div className="w-16 h-16 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="alert-triangle" size={32} />
                                        </div>
                                        <h2 className="text-xl font-bold text-slate-900 mb-2">연결 실패 (Domain Error)</h2>
                                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">
                                            카카오 개발자 콘솔에 등록된 도메인과 현재 접속 주소가 일치하지 않습니다. 아래 주소를 정확히 복사하여 등록해 주세요.
                                        </p>
                                        <div className="bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-8 text-left group cursor-pointer active:bg-slate-100 transition-colors">
                                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">등록해야 할 도메인</span>
                                            <code className="text-xs font-mono font-bold text-blue-600 break-all select-all">{window.location.origin}</code>
                                        </div>
                                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all active:scale-[0.98] shadow-xl">
                                            설정 완료 후 다시 시도
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Floating Map Controls */}
                            <div className="absolute top-6 right-6 flex flex-col gap-2 z-40">
                                <button className="w-12 h-12 bg-white rounded-xl shadow-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:text-blue-600 transition-colors active:scale-90" title="확대"><Icon name="plus" /></button>
                                <button className="w-12 h-12 bg-white rounded-xl shadow-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:text-blue-600 transition-colors active:scale-90" title="축소"><Icon name="minus" /></button>
                            </div>
                        </main>

                        {/* Sidebar Control Panel */}
                        <aside className="w-80 bg-white border-l border-slate-200 p-8 hidden lg:flex flex-col gap-8 shrink-0 overflow-y-auto">
                            <section>
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Device Coordinates</h3>
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1 uppercase">Latitude</label>
                                        <div className="relative">
                                            <Icon name="map-pin" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input 
                                                type="number" 
                                                value={pos.lat} 
                                                onChange={(e) => setPos({...pos, lat: parseFloat(e.target.value)})}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm font-mono focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1 uppercase">Longitude</label>
                                        <div className="relative">
                                            <Icon name="map-pin" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                            <input 
                                                type="number" 
                                                value={pos.lng} 
                                                onChange={(e) => setPos({...pos, lng: parseFloat(e.target.value)})}
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm font-mono focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                                            />
                                        </div>
                                    </div>
                                    <button 
                                        onClick={updateLocation}
                                        className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 active:scale-[0.97] transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2 mt-2"
                                    >
                                        <Icon name="send" size={16} />
                                        <span>위치 전송</span>
                                    </button>
                                </div>
                            </section>

                            <section className="mt-auto">
                                <div className="p-5 bg-indigo-50 rounded-2xl border border-indigo-100">
                                    <div className="flex items-center gap-2 mb-3 text-indigo-700 font-bold text-xs uppercase">
                                        <Icon name="info" size={14} />
                                        <span>Troubleshooting</span>
                                    </div>
                                    <p className="text-[11px] text-indigo-600/80 leading-relaxed font-medium">
                                        지도가 로드되지 않을 경우, 카카오 콘솔의 <b>내 애플리케이션 {">"} 앱 설정 {">"} 플랫폼</b> 탭에서 현재 사이트 주소가 <b>Web 사이트 도메인</b>에 정확히 추가되어 있는지 확인하세요.
                                    </p>
                                </div>
                            </section>
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
