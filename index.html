<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; min-height: 400px; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [userId, setUserId] = useState('');
            const [password, setPassword] = useState('');
            const [schoolName, setSchoolName] = useState('');

            const [devices] = useState([
                { id: 1, name: "김민수 학생", lat: 35.190360, lng: 128.815600, status: "moving", last_seen: "1분 전" },
                { id: 2, name: "이서연 학생", lat: 35.192360, lng: 128.818600, status: "idle", last_seen: "방금 전" },
                { id: 3, name: "박준영 학생", lat: 35.188360, lng: 128.812600, status: "offline", last_seen: "1시간 전" }
            ]);
            
            const mapRef = useRef(null);

            // T, Z, 밀리초 등을 제거하고 YYYY-MM-DD HH:mm:ss 형식만 남기는 함수
            const formatDate = (dateString) => {
                if (!dateString) return "";
                // DB에서 넘어온 2026-04-08 13:24:56.698208+00 형태를 처리
                const cleanDate = dateString.replace('T', ' ').split('.')[0].split('+')[0];
                return cleanDate;
            };

            const handleSignUp = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { error: rpcError } = await supabase.rpc('fn_insert_user', {
                        p_user_id: userId,
                        p_user_pw: password,
                        p_user_school: schoolName
                    });
                    
                    if (rpcError) throw rpcError;
                    
                    alert("성공적으로 등록되었습니다! 로그인을 진행해주세요.");
                    setView('login');
                } catch (err) { 
                    alert("등록 실패: " + err.message); 
                } finally { 
                    setLoading(false); 
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', userId)
                        .eq('user_pw', password)
                        .maybeSingle();

                    if (error) throw error;
                    if (!data) throw new Error("아이디 또는 비밀번호가 틀립니다.");

                    setUser(data);
                    setView('main');
                } catch (err) { 
                    alert("로그인 실패: " + err.message); 
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                if (view !== 'main') return;
                
                const timer = setTimeout(() => {
                    if (window.kakao && window.kakao.maps) {
                        window.kakao.maps.load(() => {
                            const container = document.getElementById('map');
                            if (!container) return;
                            const options = { center: new window.kakao.maps.LatLng(35.190360, 128.815600), level: 4 };
                            mapRef.current = new window.kakao.maps.Map(container, options);
                            devices.forEach(d => {
                                const marker = new window.kakao.maps.Marker({ position: new window.kakao.maps.LatLng(d.lat, d.lng), map: mapRef.current });
                                new window.kakao.maps.InfoWindow({ content: `<div style="padding:5px;font-size:12px;font-weight:bold;">${d.name}</div>` }).open(mapRef.current, marker);
                            });
                        });
                    }
                }, 100);
                return () => clearTimeout(timer);
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-6">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200/60 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center text-indigo-600 mb-4 shadow-inner">
                                    <Icon name="shield-check" size={40} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-800 tracking-tighter">통합 관제 시스템</h2>
                                <p className="text-slate-400 text-sm mt-2 font-medium tracking-widest uppercase">안전 관리자 전용</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">아이디</label>
                                    <input type="text" placeholder="아이디를 입력하세요" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" value={userId} onChange={e => setUserId(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase tracking-wider">비밀번호</label>
                                    <input type="password" placeholder="••••••••" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all" value={password} onChange={e => setPassword(e.target.value)} required />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 active:scale-[0.98]">
                                    {loading ? '확인 중...' : '시스템 접속하기'}
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <button onClick={() => setView('signup')} className="text-sm text-indigo-600 font-bold hover:underline underline-offset-4 transition-all">신규 관리자 계정 생성</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f0f2f5] p-6">
                        <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-200/60 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-slate-800"></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2 text-center tracking-tight">관리자 정보 등록</h2>
                            <p className="text-slate-400 text-center text-xs mb-8">안전한 관제를 위해 정보를 입력해주세요.</p>
                            <form onSubmit={handleSignUp} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1">아이디</label>
                                    <input type="text" placeholder="예: admin_01" className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" value={userId} onChange={e => setUserId(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1">비밀번호</label>
                                    <input type="password" placeholder="비밀번호 설정" className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" value={password} onChange={e => setPassword(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1">소속 학교명</label>
                                    <input type="text" placeholder="예: 한국초등학교" className="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" value={schoolName} onChange={e => setSchoolName(e.target.value)} required />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4 hover:bg-black transition-all shadow-xl active:scale-[0.98]">
                                    {loading ? '데이터 저장 중...' : '정보 등록 완료'}
                                </button>
                                <button type="button" onClick={() => setView('login')} className="w-full text-slate-400 text-xs font-bold py-2 hover:text-slate-600">이전 화면으로</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-8 bg-white shrink-0 z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <Icon name="satellite" size={20} />
                            </div>
                            <h1 className="font-black text-slate-800 text-lg tracking-tighter">실시간 관제 대시보드</h1>
                        </div>
                        <div className="flex flex-col items-end gap-0">
                            <div className="flex items-center gap-4">
                                <span className="text-xs font-bold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100 italic">{user?.user_id} 관리자님</span>
                                <button onClick={() => { setView('login'); setUser(null); }} className="text-rose-500 font-bold text-xs hover:bg-rose-50 px-4 py-2 rounded-xl transition-all border border-rose-100">
                                    <Icon name="log-out" size={14} className="inline mr-1" /> 시스템 종료
                                </button>
                            </div>
                            {user?.update_time && (
                                <span className="text-[10px] text-slate-400 mt-1 mr-2 font-mono">업데이트: {formatDate(user.update_time)}</span>
                            )}
                        </div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-80 border-r border-slate-200 bg-white flex flex-col shrink-0">
                            <div className="p-6 border-b border-slate-100">
                                <h2 className="font-black text-slate-800 text-sm tracking-tight uppercase mb-3">관제 대상 목록</h2>
                                <div className="relative">
                                    <input type="text" placeholder="학생 이름 검색..." className="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 text-xs outline-none" />
                                    <Icon name="search" size={14} className="absolute right-3 top-2.5 text-slate-300" />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto">
                                {devices.map(d => (
                                    <button key={d.id} className="w-full p-5 text-left border-b border-slate-50 hover:bg-slate-50 transition-all group relative">
                                        <div className="flex justify-between items-start mb-1">
                                            <div className="font-bold text-sm text-slate-700 group-hover:text-indigo-600 transition-colors">{d.name}</div>
                                            <div className={`px-2 py-0.5 rounded-md text-[9px] font-black uppercase ${ d.status === 'moving' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                {d.status === 'moving' ? '이동 중' : d.status === 'idle' ? '대기' : '오프라인'}
                                            </div>
                                        </div>
                                        <div className="text-[10px] text-slate-400 font-medium tracking-tight">수신 시간: {d.last_seen}</div>
                                    </button>
                                ))}
                            </div>
                        </aside>
                        <main className="flex-1 relative bg-slate-100">
                            <div id="map"></div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
