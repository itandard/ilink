<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 통합 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 카카오 지도 API - 최신 SDK 로드 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services&autoload=false"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        .custom-overlay {
            position: relative; bottom: 50px; border-radius: 12px;
            background: white; border: 1px solid #e2e8f0; padding: 8px 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .custom-overlay::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; background: white; border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0; transform: translateX(-50%) rotate(45deg);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // 학생/장치 데이터 상태 관리 (실시간 위치 시뮬레이션을 위해 state로 관리)
            const [devices, setDevices] = useState([
                { id: 1, name: "김민수 학생", lat: 35.190360, lng: 128.815600, status: "moving", battery: 85, lastUpdate: "방금 전" },
                { id: 2, name: "이서연 학생", lat: 35.192360, lng: 128.818600, status: "idle", battery: 42, lastUpdate: "3분 전" },
                { id: 3, name: "박지성 학생", lat: 35.188360, lng: 128.812600, status: "moving", battery: 98, lastUpdate: "방금 전" }
            ]);

            const [selectedId, setSelectedId] = useState(1);
            const [isMapReady, setIsMapReady] = useState(false);
            const mapRef = useRef(null);
            const markersRef = useRef({});

            // 지도 초기화
            useEffect(() => {
                if (!window.kakao) return;

                window.kakao.maps.load(() => {
                    const container = document.getElementById('map');
                    const options = {
                        center: new window.kakao.maps.LatLng(devices[0].lat, devices[0].lng),
                        level: 4
                    };

                    const map = new window.kakao.maps.Map(container, options);
                    mapRef.current = map;

                    // 초기 마커 생성
                    devices.forEach(device => {
                        const marker = new window.kakao.maps.Marker({
                            position: new window.kakao.maps.LatLng(device.lat, device.lng),
                            map: map
                        });
                        markersRef.current[device.id] = marker;

                        // 마커 클릭 이벤트
                        window.kakao.maps.event.addListener(marker, 'click', () => {
                            setSelectedId(device.id);
                        });
                    });

                    setIsMapReady(true);
                });
            }, []);

            // [실시간 이동 시뮬레이션 로직]
            useEffect(() => {
                if (!isMapReady) return;

                const interval = setInterval(() => {
                    setDevices(prevDevices => 
                        prevDevices.map(device => {
                            // idle 상태는 움직이지 않고, moving 상태만 아주 조금씩 이동
                            if (device.status === "moving") {
                                const newLat = device.lat + (Math.random() - 0.5) * 0.0001;
                                const newLng = device.lng + (Math.random() - 0.5) * 0.0001;
                                
                                // 지도 마커 위치 업데이트 (마커 객체에 직접 반영)
                                if (markersRef.current[device.id]) {
                                    const newPos = new window.kakao.maps.LatLng(newLat, newLng);
                                    markersRef.current[device.id].setPosition(newPos);
                                }

                                return { ...device, lat: newLat, lng: newLng, lastUpdate: "방금 전" };
                            }
                            return device;
                        })
                    );
                }, 3000); // 3초마다 위치 갱신

                return () => clearInterval(interval);
            }, [isMapReady]);

            // 선택된 학생이 변경될 때 지도를 이동시킴
            const selectDevice = (id) => {
                setSelectedId(id);
                const device = devices.find(d => d.id === id);
                if (device && mapRef.current) {
                    const moveLatLng = new window.kakao.maps.LatLng(device.lat, device.lng);
                    mapRef.current.panTo(moveLatLng);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-white">
                    {/* Header */}
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white shrink-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <Icon name="shield-check" size={22} />
                            </div>
                            <div>
                                <h1 className="font-bold text-slate-900 text-sm tracking-tight uppercase">Smart Student Safety</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Real-time Location Control</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex flex-col items-end mr-2">
                                <span className="text-xs font-bold text-slate-700">홍민호 선생님</span>
                                <span className="text-[10px] text-indigo-500 font-medium tracking-tight text-right">석리초등학교 1학년 1반</span>
                            </div>
                            <div className="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                                <Icon name="user" />
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Sidebar: List */}
                        <aside className="w-80 bg-white border-r border-slate-200 flex flex-col z-40">
                            <div className="p-5 border-b border-slate-100">
                                <div className="relative">
                                    <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="학생 검색..." className="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-xs outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all" />
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto">
                                {devices.map(device => (
                                    <button 
                                        key={device.id}
                                        onClick={() => selectDevice(device.id)}
                                        className={`w-full p-5 flex items-center gap-4 border-b border-slate-50 transition-all ${selectedId === device.id ? 'bg-indigo-50/50 border-l-4 border-l-indigo-600' : 'hover:bg-slate-50'}`}
                                    >
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold ${selectedId === device.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>
                                            {device.name[0]}
                                        </div>
                                        <div className="flex-1 text-left">
                                            <div className="flex items-center justify-between mb-1">
                                                <span className={`font-bold text-xs ${selectedId === device.id ? 'text-indigo-900' : 'text-slate-700'}`}>{device.name}</span>
                                                <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${device.status === 'moving' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                                                    {device.status === 'moving' ? '이동 중' : '정지'}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2 text-[10px] text-slate-400 font-medium">
                                                <span className="flex items-center gap-1"><Icon name="battery" size={10} /> {device.battery}%</span>
                                                <span>•</span>
                                                <span className="tabular-nums font-mono">{device.lat.toFixed(4)}, {device.lng.toFixed(4)}</span>
                                            </div>
                                        </div>
                                    </button>
                                ))}
                            </div>

                            <div className="p-4 mt-auto">
                                <div className="bg-slate-900 rounded-2xl p-4 text-white shadow-xl">
                                    <div className="flex items-center justify-between mb-3">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Alerts</span>
                                        <span className="w-2 h-2 bg-rose-500 rounded-full animate-ping"></span>
                                    </div>
                                    <p className="text-xs font-bold mb-1 leading-tight">모든 학생이 안전 구역 내에 위치하고 있습니다.</p>
                                    <p className="text-[10px] text-slate-400">마지막 점검: {new Date().toLocaleTimeString()}</p>
                                </div>
                            </div>
                        </aside>

                        {/* Main Map View */}
                        <main className="flex-1 relative">
                            <div id="map"></div>
                            
                            {!isMapReady && (
                                <div className="absolute inset-0 z-50 bg-slate-50 flex flex-col items-center justify-center gap-4">
                                    <Icon name="loader" size={32} className="text-indigo-600 animate-spin" />
                                    <span className="text-sm font-bold text-slate-500">관제 시스템 데이터를 로드 중입니다...</span>
                                </div>
                            )}

                            {/* Floating Stats */}
                            <div className="absolute top-6 left-6 flex items-center gap-2 z-30">
                                <div className="bg-white/90 backdrop-blur shadow-xl border border-slate-200 rounded-2xl p-4 flex items-center gap-4">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Total Devices</span>
                                        <span className="text-xl font-black text-slate-900">3 / 3</span>
                                    </div>
                                    <div className="w-px h-8 bg-slate-200"></div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Safety Status</span>
                                        <span className="text-xl font-black text-emerald-600 tracking-tighter">SECURED</span>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
