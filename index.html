<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link (아이-링크) - 한글판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 카카오맵 API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f8fafc; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .custom-overlay {
            position: relative;
            bottom: 55px;
            background: #2563eb;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            white-space: nowrap;
            border: 2px solid white;
        }
        .custom-overlay::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .dot-marker {
            width: 8px;
            height: 8px;
            background: #2563eb;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([
                { stu_no: 1, stu_name: '김민수', status: '정상' },
                { stu_no: 2, stu_name: '이서연', status: '주의' },
                { stu_no: 3, stu_name: '박준혁', status: '정상' },
                { stu_no: 4, stu_name: '최다인', status: '미감지' }
            ]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const mapRef = useRef(null);
            const mainMarkerRef = useRef(null);
            const pathMarkersRef = useRef([]);
            const polylineRef = useRef(null);
            const overlayRef = useRef(null);
            const simIntervalRef = useRef(null);

            // 지도 초기화
            const initMap = () => {
                const container = document.getElementById('map');
                if (!container || mapRef.current) return;

                const startPos = new window.kakao.maps.LatLng(35.2456, 128.6922); 
                const options = { center: startPos, level: 3 };
                const map = new window.kakao.maps.Map(container, options);
                
                map.addControl(new window.kakao.maps.MapTypeControl(), window.kakao.maps.ControlPosition.TOPRIGHT);
                map.addControl(new window.kakao.maps.ZoomControl(), window.kakao.maps.ControlPosition.RIGHT);

                mapRef.current = map;
            };

            const stopSimulation = () => {
                if (simIntervalRef.current) clearInterval(simIntervalRef.current);
                if (mainMarkerRef.current) mainMarkerRef.current.setMap(null);
                if (polylineRef.current) polylineRef.current.setMap(null);
                if (overlayRef.current) overlayRef.current.setMap(null);
                pathMarkersRef.current.forEach(m => m.setMap(null));
                pathMarkersRef.current = [];
            };

            const startSimulation = (student) => {
                if (!mapRef.current) return;
                stopSimulation();
                
                const startLat = 35.2456;
                const startLng = 128.6922;
                const initialPos = new window.kakao.maps.LatLng(startLat, startLng);
                
                mapRef.current.panTo(initialPos);

                const marker = new window.kakao.maps.Marker({ position: initialPos });
                marker.setMap(mapRef.current);
                mainMarkerRef.current = marker;

                const content = `<div class="custom-overlay">${student.stu_name} 학생</div>`;
                const overlay = new window.kakao.maps.CustomOverlay({
                    content: content,
                    position: initialPos,
                    yAnchor: 1
                });
                overlay.setMap(mapRef.current);
                overlayRef.current = overlay;

                const polyline = new window.kakao.maps.Polyline({
                    path: [initialPos],
                    strokeWeight: 4,
                    strokeColor: '#2563eb',
                    strokeOpacity: 0.6,
                    strokeStyle: 'shortdash'
                });
                polyline.setMap(mapRef.current);
                polylineRef.current = polyline;

                let currentPath = [initialPos];
                let lastLat = startLat;
                let lastLng = startLng;

                simIntervalRef.current = setInterval(() => {
                    const nextLat = lastLat + (Math.random() - 0.5) * 0.0006;
                    const nextLng = lastLng + (Math.random() - 0.5) * 0.0006;
                    const nextPos = new window.kakao.maps.LatLng(nextLat, nextLng);

                    const dotContent = document.createElement('div');
                    dotContent.className = 'dot-marker';
                    const dotMarker = new window.kakao.maps.CustomOverlay({
                        position: new window.kakao.maps.LatLng(lastLat, lastLng),
                        content: dotContent
                    });
                    dotMarker.setMap(mapRef.current);
                    pathMarkersRef.current.push(dotMarker);

                    currentPath.push(nextPos);
                    marker.setPosition(nextPos);
                    overlay.setPosition(nextPos);
                    polyline.setPath(currentPath);
                    
                    mapRef.current.panTo(nextPos);

                    lastLat = nextLat;
                    lastLng = nextLng;
                }, 3000);
            };

            const handleStudentSelect = (student) => {
                setSelectedStudent(student);
                startSimulation(student);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setUser({ user_name: '운영자', user_school: '국립창원대학교' });
                setView('dashboard');
            };

            useEffect(() => {
                if (view === 'dashboard') {
                    setTimeout(initMap, 100);
                }
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-10 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-block p-4 bg-blue-600 rounded-2xl text-white mb-6 shadow-lg shadow-blue-100">
                                    <LucideIcon name="eye" size={32} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tighter mb-2">아이-링크</h2>
                                <p className="text-slate-400 text-sm font-medium tracking-tight">통합 안전 관제 시스템</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">관리자 아이디</label>
                                    <input className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="아이디를 입력하세요" required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[11px] font-bold text-slate-400 ml-1 uppercase">비밀번호</label>
                                    <input type="password" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="비밀번호를 입력하세요" required />
                                </div>
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg active:scale-[0.98] mt-2">시스템 접속</button>
                                <div className="text-center mt-6 pt-6 border-t border-slate-50">
                                    <p className="text-slate-400 text-xs mb-3">관리자 계정이 없으신가요?</p>
                                    <a href="signup.html" className="text-blue-600 text-xs font-bold hover:underline">신규 관리자 가입하기</a>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white shrink-0 z-30">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                <LucideIcon name="eye" size={16} />
                            </div>
                            <span className="font-black text-slate-900 tracking-tighter text-xl italic uppercase">Eye-Link</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[11px] font-black text-slate-800 uppercase leading-none">{user?.user_name} 관리자님</p>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1">{user?.user_school}</p>
                            </div>
                            <button onClick={() => setView('login')} className="p-2 bg-slate-50 text-slate-400 hover:text-rose-500 rounded-xl transition-all">
                                <LucideIcon name="log-out" size={18} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-72 border-r border-slate-200 flex flex-col shrink-0 bg-white z-20">
                            <div className="p-5 border-b border-slate-100">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">모니터링 대상</p>
                                <div className="relative">
                                    <LucideIcon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" />
                                    <input className="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-lg text-[11px] outline-none" placeholder="학생 성함으로 검색..." />
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-1">
                                {students.map(s => (
                                    <button 
                                        key={s.stu_no}
                                        onClick={() => handleStudentSelect(s)}
                                        className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${selectedStudent?.stu_no === s.stu_no ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-50 text-slate-600'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-black shrink-0 ${selectedStudent?.stu_no === s.stu_no ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            {s.stu_name.substring(0,1)}
                                        </div>
                                        <div className="text-left flex-1">
                                            <div className="text-[12px] font-bold tracking-tight">{s.stu_name} 학생</div>
                                            <div className={`text-[9px] font-medium opacity-60 ${selectedStudent?.stu_no === s.stu_no ? 'text-white' : 'text-slate-400'}`}>노드번호: {s.stu_no}</div>
                                        </div>
                                        <div className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${s.status === '정상' ? (selectedStudent?.stu_no === s.stu_no ? 'bg-white/20' : 'bg-emerald-50 text-emerald-500') : (selectedStudent?.stu_no === s.stu_no ? 'bg-white/20' : 'bg-amber-50 text-amber-500')}`}>
                                            {s.status}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 relative bg-slate-50">
                            <div id="map" className="w-full h-full"></div>
                            
                            {selectedStudent && (
                                <div className="absolute top-6 left-6 z-10 animate-in slide-in-from-top-4 duration-500">
                                    <div className="bg-slate-900/90 backdrop-blur-md text-white px-5 py-4 rounded-[1.5rem] shadow-2xl border border-white/10 flex items-center gap-4">
                                        <div className="flex flex-col">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[14px] font-black tracking-tight">{selectedStudent.stu_name} 학생 실시간 위치 추적</span>
                                                <span className="bg-blue-500 text-white px-2 py-0.5 rounded-md text-[9px] font-black uppercase">활성</span>
                                            </div>
                                            <p className="text-[10px] text-slate-400 font-medium mt-0.5 uppercase tracking-tighter flex items-center gap-2">
                                                <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></span>
                                                GPS 신호 수신 중 (3초 간격)
                                            </p>
                                        </div>
                                        <div className="h-8 w-px bg-white/10 mx-2"></div>
                                        <button onClick={() => { stopSimulation(); setSelectedStudent(null); }} className="text-white/40 hover:text-white transition-all">
                                            <LucideIcon name="x" size={20} />
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="absolute bottom-6 left-6 z-10 flex gap-2">
                                <div className="bg-white px-4 py-2.5 rounded-2xl shadow-lg border border-slate-100 flex items-center gap-3">
                                    <LucideIcon name="navigation" size={14} className="text-blue-600" />
                                    <span className="text-[10px] font-bold text-slate-700 tracking-tighter">창원대학교 정문 기점</span>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
