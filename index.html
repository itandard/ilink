<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        #map-container { width: 100%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // OS 판별 함수
        const getPlatformName = () => {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf("android") > -1) return "안드로이드";
            if (ua.indexOf("iphone") > -1 || ua.indexOf("ipad") > -1) return "iOS";
            if (ua.indexOf("win") > -1) return "윈도우";
            if (ua.indexOf("mac") > -1) return "Mac";
            if (ua.indexOf("linux") > -1) return "리눅스";
            return "기타";
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [authForm, setAuthForm] = useState({ id: '', pw: '' });
            const [regForm, setRegForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapInstance = useRef(null);
            const markers = useRef({}); // 학생 ID별 마커 저장
            const paths = useRef({});   // 학생 ID별 이동 경로 저장

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view]);

            // 무작위 이동 시뮬레이션 및 경로 업데이트
            useEffect(() => {
                if (view === 'main' && students.length > 0) {
                    const moveInterval = setInterval(() => {
                        setStudents(prev => prev.map(s => {
                            const newLat = s.lat + (Math.random() - 0.5) * 0.0004;
                            const newLng = s.lng + (Math.random() - 0.5) * 0.0004;
                            const newHistory = [...(s.history || []), new window.kakao.maps.LatLng(newLat, newLng)];
                            
                            // 경로 꼬리 길이 제한 (최근 10개 좌표만 유지)
                            if (newHistory.length > 10) newHistory.shift();

                            return { ...s, lat: newLat, lng: newLng, history: newHistory };
                        }));
                    }, 4000);
                    return () => clearInterval(moveInterval);
                }
            }, [view, students.length]);

            // 지도 및 마커/경로 렌더링
            useEffect(() => {
                if (view === 'main') {
                    const timer = setTimeout(() => {
                        if (!mapInstance.current) {
                            const container = document.getElementById('map');
                            const options = {
                                center: new window.kakao.maps.LatLng(35.2456, 128.6922),
                                level: 4
                            };
                            mapInstance.current = new window.kakao.maps.Map(container, options);
                        }
                        renderMapElements();
                    }, 300);
                    return () => clearTimeout(timer);
                }
            }, [view, students]);

            const renderMapElements = () => {
                if (!mapInstance.current || !window.kakao) return;

                students.forEach(s => {
                    const position = new window.kakao.maps.LatLng(s.lat, s.lng);

                    // 1. 마커 업데이트 (색상별 핀)
                    if (!markers.current[s.id]) {
                        // 학생별 전용 마커 이미지 생성 (SVG 또는 컬러 핀)
                        // 여기서는 카카오맵 기본 마커에 필터를 입히거나 커스텀 오버레이 사용 가능하나, 
                        // 직관적인 구현을 위해 커스텀 마커 이미지 URL 구조 활용 (가상)
                        const imageSrc = `https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png`; // 예시 색상 마커
                        const imageSize = new window.kakao.maps.Size(24, 35);
                        const markerImage = new window.kakao.maps.MarkerImage(imageSrc, imageSize);

                        markers.current[s.id] = new window.kakao.maps.Marker({
                            position: position,
                            map: mapInstance.current,
                            title: s.name,
                            image: markerImage
                        });
                    } else {
                        markers.current[s.id].setPosition(position);
                    }

                    // 2. 이동 경로 업데이트 (점선 표시)
                    if (s.history && s.history.length > 1) {
                        if (paths.current[s.id]) {
                            paths.current[s.id].setMap(null);
                        }
                        
                        paths.current[s.id] = new window.kakao.maps.Polyline({
                            path: s.history,
                            strokeWeight: 3,
                            strokeColor: s.color,
                            strokeOpacity: 0.7,
                            strokeStyle: 'dash' // 점선 스타일
                        });
                        paths.current[s.id].setMap(mapInstance.current);
                    }
                });
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data: userData, error: userError } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (userError || !userData) {
                        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                        return;
                    }

                    // 로그인 로그 기록 수정 (Platform & UserAgent)
                    const platformName = getPlatformName();
                    await supabase.from('t_login').insert([{ 
                        user_id: authForm.id, 
                        platform: platformName,
                        user_agent: navigator.userAgent,
                        update_time: new Date().toISOString() 
                    }]);

                    setUser(userData);
                    setView('main');
                    fetchStudents();
                } catch (err) {
                    alert("서버 통신 오류");
                } finally {
                    setLoading(false);
                }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase.rpc('fn_insert_user', {
                        p_user_id: regForm.id,
                        p_user_pw: regForm.pw,
                        p_user_name: regForm.name,
                        p_user_school: regForm.school
                    });
                    if (error) { alert("가입 실패: " + error.message); return; }
                    alert("가입 성공! 로그인 해주세요.");
                    setView('login');
                } catch (err) { alert("통신 오류"); } finally { setLoading(false); }
            };

            const fetchStudents = async () => {
                const { data, error } = await supabase.from('t_student').select('stu_no, stu_name');
                if (!error && data) {
                    const colors = ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'];
                    setStudents(data.map((s, idx) => {
                        const startPos = {
                            lat: 35.2456 + (Math.random() - 0.5) * 0.003,
                            lng: 128.6922 + (Math.random() - 0.5) * 0.003
                        };
                        return {
                            id: s.stu_no,
                            name: s.stu_name,
                            color: colors[idx % colors.length],
                            lat: startPos.lat,
                            lng: startPos.lng,
                            history: [new window.kakao.maps.LatLng(startPos.lat, startPos.lng)]
                        };
                    }));
                }
            };

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-100 px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px]">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-black text-slate-900">아이-링크</h1>
                                <p className="text-xs font-bold text-blue-600 mt-2 uppercase">Student Safety Portal</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-600 font-semibold"
                                    placeholder="ID"
                                    value={authForm.id}
                                    onChange={e => setAuthForm({...authForm, id: e.target.value})}
                                    required
                                />
                                <input 
                                    type="password"
                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-600 font-semibold"
                                    placeholder="Password"
                                    value={authForm.pw}
                                    onChange={e => setAuthForm({...authForm, pw: e.target.value})}
                                    required
                                />
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">로그인</button>
                            </form>
                            <button onClick={() => setView('signup')} className="w-full mt-6 text-blue-600 text-xs font-bold hover:underline">신규 가입하기</button>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-100 px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px]">
                            <h2 className="text-2xl font-black text-center mb-6">회원가입</h2>
                            <form onSubmit={handleSignup} className="space-y-3">
                                <input placeholder="이름" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} required />
                                <input placeholder="아이디" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.id} onChange={e => setRegForm({...regForm, id: e.target.value})} required />
                                <input type="password" placeholder="비밀번호" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.pw} onChange={e => setRegForm({...regForm, pw: e.target.value})} required />
                                <input placeholder="소속 기관/학교" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.school} onChange={e => setRegForm({...regForm, school: e.target.value})} required />
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 mt-4">등록 신청</button>
                            </form>
                            <button onClick={() => setView('login')} className="w-full mt-4 text-slate-400 text-xs">취소</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 z-[2000]">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">E</div>
                            <h2 className="font-black text-lg text-slate-800 tracking-tight">EYE-LINK <span className="text-blue-600">LIVE</span></h2>
                        </div>
                        <div className="flex items-center gap-4 text-sm font-bold">
                            <div className="flex flex-col items-end leading-none">
                                <span className="text-blue-600 text-[10px]">{user?.user_school}</span>
                                <span className="text-slate-800">{user?.user_name} 님</span>
                            </div>
                            <button onClick={() => window.location.reload()} className="p-2 bg-slate-100 rounded-full hover:bg-red-50 hover:text-red-500 transition-colors">
                                <i data-lucide="log-out" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </header>
                    
                    <div className="flex-1 flex relative overflow-hidden">
                        {/* 고정 사이드바 */}
                        <aside className="w-80 bg-white border-r flex flex-col z-[1500] shadow-2xl shadow-slate-200">
                            <div className="p-6 border-b bg-slate-50/50">
                                <div className="flex items-center justify-between">
                                    <h3 className="font-black text-slate-800 text-sm">학생 위치 목록</h3>
                                    <span className="px-2 py-0.5 bg-emerald-100 text-emerald-600 text-[10px] rounded-full font-bold animate-pulse">LIVE</span>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
                                {students.map(s => (
                                    <div key={s.id} className="p-4 bg-white border border-slate-100 rounded-2xl flex items-center gap-3 hover:shadow-md transition-all cursor-pointer group hover:border-blue-200">
                                        <div className="w-3 h-3 rounded-full shadow-inner" style={{backgroundColor: s.color}}></div>
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-slate-800">{s.name}</span>
                                            <span className="text-[10px] font-mono text-slate-400 tracking-tighter">{s.id}</span>
                                        </div>
                                        <div className="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-slate-300"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        {/* 메인 맵 */}
                        <main className="flex-1 relative bg-slate-200">
                            <div id="map-container">
                                <div id="map"></div>
                            </div>
                            
                            {/* 플랫폼 정보 배너 */}
                            <div className="absolute bottom-6 left-6 z-[1000] bg-slate-900/80 backdrop-blur text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-4 border border-white/10">
                                <div className="flex flex-col">
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Active Device</span>
                                    <span className="text-xs font-black flex items-center gap-2">
                                        <i data-lucide="monitor" className="w-3 h-3"></i>
                                        {getPlatformName()} 접속 중
                                    </span>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
