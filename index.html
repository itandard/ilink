<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        
        #map-container { 
            width: 100%; 
            height: 100%; 
            position: relative;
        }
        #map { 
            width: 100%; 
            height: 100%; 
            z-index: 1;
        }

        .login-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [authForm, setAuthForm] = useState({ id: '', pw: '' });
            const [regForm, setRegForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapInstance = useRef(null);
            const markers = useRef([]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view]);

            // 실시간 무작위 이동 로직 (이전 내용 복구)
            useEffect(() => {
                if (view === 'main' && students.length > 0) {
                    const moveInterval = setInterval(() => {
                        setStudents(prev => prev.map(s => ({
                            ...s,
                            lat: s.lat + (Math.random() - 0.5) * 0.0002,
                            lng: s.lng + (Math.random() - 0.5) * 0.0002
                        })));
                    }, 3000);
                    return () => clearInterval(moveInterval);
                }
            }, [view, students.length]);

            // 지도 초기화 및 마커 업데이트
            useEffect(() => {
                if (view === 'main') {
                    const timer = setTimeout(() => {
                        if (!mapInstance.current) {
                            const container = document.getElementById('map');
                            const options = {
                                center: new window.kakao.maps.LatLng(35.2456, 128.6922),
                                level: 4
                            };
                            mapInstance.current = new window.kakao.maps.Map(container, options);
                        }
                        updateMarkers();
                    }, 200);
                    return () => clearTimeout(timer);
                }
            }, [view, students]);

            const updateMarkers = () => {
                if (!mapInstance.current || !window.kakao) return;

                // 기존 마커 제거
                markers.current.forEach(m => m.setMap(null));
                markers.current = [];

                // 새 마커 추가
                students.forEach(s => {
                    const marker = new window.kakao.maps.Marker({
                        position: new window.kakao.maps.LatLng(s.lat, s.lng),
                        map: mapInstance.current,
                        title: s.name
                    });
                    markers.current.push(marker);
                });
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data: userData, error: userError } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (userError || !userData) {
                        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                        return;
                    }

                    // 로그인 기록 저장 (유지)
                    await supabase.from('t_login').insert([{ 
                        user_id: authForm.id, 
                        platform: window.navigator.platform,
                        update_time: new Date().toISOString() 
                    }]);

                    setUser(userData);
                    setView('main');
                    fetchStudents();
                } catch (err) {
                    alert("서버 통신 오류");
                } finally {
                    setLoading(false);
                }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const { data, error } = await supabase.rpc('fn_insert_user', {
                        p_user_id: regForm.id,
                        p_user_pw: regForm.pw,
                        p_user_name: regForm.name,
                        p_user_school: regForm.school
                    });
                    if (error) { alert("가입 실패: " + error.message); return; }
                    alert("등록되었습니다!");
                    setView('login');
                } catch (err) { alert("통신 오류"); } finally { setLoading(false); }
            };

            const fetchStudents = async () => {
                const { data, error } = await supabase.from('t_student').select('stu_no, stu_name');
                if (!error && data) {
                    setStudents(data.map((s, idx) => ({
                        id: s.stu_no,
                        name: s.stu_name,
                        color: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444'][idx % 4],
                        lat: 35.2456 + (Math.random() - 0.5) * 0.005,
                        lng: 128.6922 + (Math.random() - 0.5) * 0.005
                    })));
                }
            };

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px]">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-black text-slate-900">아이-링크</h1>
                                <p className="text-xs font-bold text-blue-600 mt-2 uppercase">Admin Portal</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-600 font-semibold"
                                    placeholder="아이디"
                                    value={authForm.id}
                                    onChange={e => setAuthForm({...authForm, id: e.target.value})}
                                    required
                                />
                                <input 
                                    type="password"
                                    className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-600 font-semibold"
                                    placeholder="비밀번호"
                                    value={authForm.pw}
                                    onChange={e => setAuthForm({...authForm, pw: e.target.value})}
                                    required
                                />
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">로그인</button>
                            </form>
                            <button onClick={() => setView('signup')} className="w-full mt-6 text-blue-600 text-xs font-bold hover:underline">신규 관리자 가입</button>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px]">
                            <h2 className="text-2xl font-black text-center mb-6">관리자 등록</h2>
                            <form onSubmit={handleSignup} className="space-y-3">
                                <input placeholder="이름" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} required />
                                <input placeholder="아이디" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.id} onChange={e => setRegForm({...regForm, id: e.target.value})} required />
                                <input type="password" placeholder="비밀번호" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.pw} onChange={e => setRegForm({...regForm, pw: e.target.value})} required />
                                <input placeholder="소속 학교" className="w-full px-5 py-3.5 bg-slate-50 border rounded-xl" value={regForm.school} onChange={e => setRegForm({...regForm, school: e.target.value})} required />
                                <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 mt-4">등록하기</button>
                            </form>
                            <button onClick={() => setView('login')} className="w-full mt-4 text-slate-400 text-xs">돌아가기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 z-[2000]">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">E</div>
                            <h2 className="font-black text-lg text-slate-800">EYE-LINK CONTROL</h2>
                        </div>
                        <div className="flex items-center gap-4 text-sm font-bold">
                            <span className="text-blue-600">{user?.user_school}</span>
                            <span>{user?.user_name} 관리자</span>
                            <button onClick={() => window.location.reload()} className="ml-4 text-slate-400 hover:text-red-500">로그아웃</button>
                        </div>
                    </header>
                    
                    <div className="flex-1 flex relative overflow-hidden">
                        {/* 왼쪽 고정 탭 (복구 완료) */}
                        <aside className="w-80 bg-white border-r flex flex-col z-[1500] shadow-xl">
                            <div className="p-6 border-b bg-slate-50/50">
                                <h3 className="font-black text-slate-800 flex items-center gap-2">
                                    <i data-lucide="users" className="w-4 h-4"></i>
                                    학생 모니터링 목록
                                </h3>
                                <p className="text-[10px] text-slate-400 font-bold mt-1">REAL-TIME TRACKING ACTIVE</p>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
                                {students.map(s => (
                                    <div key={s.id} className="p-4 bg-slate-50 border border-slate-100 rounded-2xl flex items-center gap-3 hover:border-blue-400 hover:bg-white transition-all cursor-pointer group">
                                        <div className="w-2 h-10 rounded-full" style={{backgroundColor: s.color}}></div>
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-slate-800">{s.name}</span>
                                            <span className="text-[10px] font-mono text-slate-400 uppercase tracking-tighter">{s.id}</span>
                                        </div>
                                        <div className="ml-auto flex items-center text-emerald-500 gap-1 animate-pulse">
                                            <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                            <span className="text-[10px] font-black">LIVE</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        {/* 메인 지도 영역 (잘림 방지 로직 적용) */}
                        <main className="flex-1 relative bg-slate-200">
                            <div id="map-container">
                                <div id="map"></div>
                            </div>
                            
                            {/* 지도 위 플로팅 정보창 */}
                            <div className="absolute top-4 right-4 z-[1000] bg-white/90 backdrop-blur-md px-4 py-2 rounded-full shadow-lg border border-white/50 text-[10px] font-black text-slate-600 flex items-center gap-3">
                                <div className="flex items-center gap-1.5">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full"></span>
                                    <span>정상 수신중</span>
                                </div>
                                <div className="w-px h-3 bg-slate-300"></div>
                                <span>접속 IP: 121.144.***.***</span>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
