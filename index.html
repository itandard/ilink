<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 실시간 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- [중요] 공식 문서 가이드: 실행 코드보다 먼저 선언되어야 함 -->
    <!-- appkey 부분에 본인의 JavaScript 키를 입력하세요 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services,clusterer,drawing"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; border-radius: 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [lat, setLat] = useState(35.190360); 
            const [lng, setLng] = useState(128.815600); 
            const [mapInstance, setMapInstance] = useState(null);
            const [markerInstance, setMarkerInstance] = useState(null);
            const [isApiReady, setIsApiReady] = useState(false);

            // 지도 초기 로드
            useEffect(() => {
                if (typeof kakao !== 'undefined' && kakao.maps) {
                    const container = document.getElementById('map');
                    const options = {
                        center: new kakao.maps.LatLng(lat, lng),
                        level: 3
                    };
                    
                    const map = new kakao.maps.Map(container, options);
                    const marker = new kakao.maps.Marker({
                        position: new kakao.maps.LatLng(lat, lng)
                    });
                    
                    marker.setMap(map);
                    
                    setMapInstance(map);
                    setMarkerInstance(marker);
                    setIsApiReady(true);
                } else {
                    console.error("Kakao Maps API not loaded");
                }
            }, []);

            // 좌표 변경 시 지도 및 마커 업데이트
            const handleMove = () => {
                if (mapInstance && markerInstance) {
                    const newPos = new kakao.maps.LatLng(lat, lng);
                    mapInstance.panTo(newPos);
                    markerInstance.setPosition(newPos);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-white overflow-hidden">
                    {/* Header */}
                    <header className="h-16 border-b border-slate-200 flex items-center justify-between px-6 bg-white z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <Icon name="map-pin" size={18} />
                            </div>
                            <h1 className="font-bold text-slate-800 tracking-tight">GPS 실시간 관제</h1>
                        </div>
                        <div className="flex items-center gap-4 text-xs">
                            <div className="flex items-center gap-1.5">
                                <span className={`w-2 h-2 rounded-full ${isApiReady ? 'bg-emerald-500' : 'bg-red-500'}`}></span>
                                <span className="text-slate-500 font-medium">{isApiReady ? '연결됨' : '연결 안됨'}</span>
                            </div>
                            <button 
                                onClick={() => window.location.reload()}
                                className="bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-md transition-colors"
                            >
                                새로고침
                            </button>
                        </div>
                    </header>

                    {/* Main Area */}
                    <div className="flex-1 relative flex">
                        {/* Control Panel (Side) */}
                        <aside className="w-80 bg-white border-r border-slate-200 p-6 z-40 hidden md:block">
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">위치 수동 설정</h2>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="text-[11px] font-bold text-slate-500 block mb-1">위도 (Latitude)</label>
                                    <input 
                                        type="number" 
                                        value={lat} 
                                        onChange={(e) => setLat(e.target.value)}
                                        className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-slate-500 block mb-1">경도 (Longitude)</label>
                                    <input 
                                        type="number" 
                                        value={lng} 
                                        onChange={(e) => setLng(e.target.value)}
                                        className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>
                                <button 
                                    onClick={handleMove}
                                    className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-all active:scale-[0.98] shadow-lg mt-2 text-sm"
                                >
                                    지도 위치 업데이트
                                </button>
                            </div>

                            <div className="mt-12 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                <h3 className="text-xs font-bold text-blue-700 mb-2">도움말</h3>
                                <p className="text-[11px] text-blue-600 leading-relaxed">
                                    지도가 나타나지 않는다면 카카오 개발자 센터의 <b>Web 플랫폼 도메인 설정</b>을 다시 확인해 주세요.
                                    <br/><br/>
                                    등록 주소: <br/>
                                    <span className="font-mono bg-white/50 px-1">{window.location.origin}</span>
                                </p>
                            </div>
                        </aside>

                        {/* Map Area */}
                        <div className="flex-1 relative bg-slate-100">
                            {/* 실제 지도가 그려지는 영역 */}
                            <div id="map"></div>

                            {/* Mobile Floating Control */}
                            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-sm md:hidden z-50">
                                <div className="bg-white/90 backdrop-blur shadow-2xl rounded-2xl p-4 border border-white/50">
                                    <div className="flex gap-2">
                                        <input 
                                            type="number" 
                                            value={lat} 
                                            onChange={(e)=>setLat(e.target.value)}
                                            className="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs outline-none"
                                        />
                                        <input 
                                            type="number" 
                                            value={lng} 
                                            onChange={(e)=>setLng(e.target.value)}
                                            className="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs outline-none"
                                        />
                                        <button onClick={handleMove} className="bg-blue-600 text-white px-4 rounded-lg font-bold text-xs">이동</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
