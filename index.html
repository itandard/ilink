<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; background-color: #f8fafc; }
        #map { width: 100%; height: 100%; position: absolute; }
        .student-marker-label {
            position: relative; bottom: 55px; padding: 5px 10px; border-radius: 12px;
            color: white; font-size: 11px; font-weight: 800; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid white; transform: translateX(-50%);
        }
        .login-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [authForm, setAuthForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapInstance = useRef(null);
            const markers = useRef({});

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    // 1. 사용자 정보 확인 (t_user)
                    const { data: userData, error: userError } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (userError || !userData) {
                        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                        setLoading(false);
                        return;
                    }

                    // 2. 로그인 기록 삽입 (t_login)
                    // 만약 이 단계에서 데이터가 안 쌓인다면, t_login 테이블의 RLS 설정을 확인해야 합니다.
                    const { error: logError } = await supabase
                        .from('t_login')
                        .insert([
                            { 
                                user_id: authForm.id, 
                                platform: window.navigator.platform,
                                user_agent: window.navigator.userAgent,
                                // DB 컬럼명이 update_time인지, created_at인지 다시 한 번 확인 필요
                                update_time: new Date().toISOString() 
                            }
                        ]);

                    if (logError) {
                        console.error("t_login insert 에러 상세:", logError);
                        // 로그 저장이 실패해도 메인 화면으로는 진입하게 하거나, 강제 중단할 수 있습니다.
                    } else {
                        console.log("t_login 기록 성공");
                    }

                    setUser(userData);
                    setView('main');
                    fetchStudents();

                } catch (err) {
                    console.error("예상치 못한 오류:", err);
                    alert("시스템 오류가 발생했습니다. 콘솔을 확인하세요.");
                } finally {
                    setLoading(false);
                }
            };

            const fetchStudents = async () => {
                const { data, error } = await supabase.from('t_student').select('stu_no, stu_name');
                if (!error && data) {
                    setStudents(data.map((s, idx) => ({
                        id: s.stu_no,
                        name: s.stu_name,
                        color: ['#EF4444', '#3B82F6', '#10B981'][idx % 3],
                        lat: 35.2456 + (Math.random() * 0.002),
                        lng: 128.6922 + (Math.random() * 0.002),
                        path: []
                    })));
                }
            };

            // ... (나머지 지도 및 UI 로직은 이전과 동일)

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px]">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter">아이-링크</h1>
                                <p className="text-xs font-bold text-slate-400 mt-2">ADMIN LOGIN</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500 transition-all"
                                    placeholder="아이디"
                                    value={authForm.id}
                                    onChange={e => setAuthForm({...authForm, id: e.target.value})}
                                    required
                                />
                                <input 
                                    type="password"
                                    className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none focus:border-blue-500 transition-all"
                                    placeholder="비밀번호"
                                    value={authForm.pw}
                                    onChange={e => setAuthForm({...authForm, pw: e.target.value})}
                                    required
                                />
                                <button className="w-full bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                                    {loading ? "확인 중..." : "로그인"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8">
                        <h2 className="font-black text-lg">아이-링크 관제 시스템</h2>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold">{user?.user_name}님</span>
                            <button onClick={() => window.location.reload()} className="text-xs text-slate-400">로그아웃</button>
                        </div>
                    </header>
                    <div className="flex-1 relative">
                        <div id="map"></div>
                        <aside className="absolute left-4 top-4 bottom-4 w-64 bg-white/90 backdrop-blur shadow-xl rounded-3xl z-[1000] p-6 overflow-y-auto">
                            <h3 className="font-black text-sm mb-4">실시간 위치</h3>
                            {students.map(s => (
                                <div key={s.id} className="mb-3 p-3 bg-white border rounded-xl flex items-center gap-3">
                                    <div className="w-2 h-2 rounded-full" style={{backgroundColor: s.color}}></div>
                                    <span className="text-sm font-bold">{s.name}</span>
                                </div>
                            ))}
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
