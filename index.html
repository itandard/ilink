<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye-Link Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Kakao Map API -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { width: 100%; height: 100%; background-color: #f1f5f9; }
        
        .student-label {
            position: relative;
            bottom: 45px;
            padding: 4px 10px;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase Init
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 한국 시간 포맷터 (YYYY-MM-DD HH:mm:ss)
        const getKSTTime = () => {
            const now = new Date();
            const options = {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Seoul'
            };
            const formatter = new Intl.DateTimeFormat('ko-KR', options);
            const parts = formatter.formatToParts(now);
            const p = {};
            parts.forEach(({type, value}) => p[type] = value);
            return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute}:${p.second}`;
        };

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [loginInfo, setLoginInfo] = useState({ id: '', pw: '' });
            
            // 학생 초기 데이터
            const [students, setStudents] = useState([
                { id: 1, name: '학생 1', color: '#2563eb', lat: 35.2456, lng: 128.6922, path: [], dir: { lat: 0.0002, lng: 0.0001 } },
                { id: 2, name: '학생 2', color: '#dc2626', lat: 35.2460, lng: 128.6930, path: [], dir: { lat: -0.0001, lng: 0.0003 } },
                { id: 3, name: '학생 3', color: '#16a34a', lat: 35.2445, lng: 128.6910, path: [], dir: { lat: 0.0001, lng: -0.0002 } }
            ]);
            
            const [selectedStudentId, setSelectedStudentId] = useState(null);
            const mapRef = useRef(null);
            const markersRef = useRef({});
            const overlaysRef = useRef({});
            const polylineRef = useRef(null);

            // 카카오맵 초기화
            const initMap = () => {
                const container = document.getElementById('map');
                if (!container || mapRef.current) return;
                const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 4 };
                mapRef.current = new window.kakao.maps.Map(container, options);
            };

            // 로그인 처리
            const handleLogin = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase.from('t_user').select('*').eq('user_id', loginInfo.id).eq('user_pw', loginInfo.pw).single();
                if (error || !data) return alert("로그인 실패");
                
                // 한국 시간 기준으로 로그인 로그 기록 (시분초까지만)
                const kstNow = getKSTTime();
                await supabase.from('t_login').insert([{ 
                    user_id: loginInfo.id, 
                    platform: 'Web', 
                    user_agent: navigator.userAgent,
                    login_time: kstNow 
                }]);
                
                setUser(data);
                setView('dashboard');
            };

            // 3초마다 학생 위치 업데이트
            useEffect(() => {
                if (view !== 'dashboard') return;

                const moveInterval = setInterval(() => {
                    setStudents(prev => prev.map(s => {
                        const nextLat = s.lat + s.dir.lat;
                        const nextLng = s.lng + s.dir.lng;
                        const nextPos = new window.kakao.maps.LatLng(nextLat, nextLng);

                        if (!markersRef.current[s.id]) {
                            const markerImg = `data:image/svg+xml;base64,${btoa(`
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="12" cy="12" r="8" fill="${s.color}" stroke="white" stroke-width="3"/>
                                </svg>
                            `)}`;
                            const imageSize = new window.kakao.maps.Size(24, 24);
                            const markerImage = new window.kakao.maps.MarkerImage(markerImg, imageSize);

                            markersRef.current[s.id] = new window.kakao.maps.Marker({
                                position: nextPos,
                                image: markerImage,
                                map: mapRef.current
                            });

                            overlaysRef.current[s.id] = new window.kakao.maps.CustomOverlay({
                                position: nextPos,
                                content: `<div class="student-label" style="background:${s.color}">${s.name}</div>`,
                                yAnchor: 1,
                                map: mapRef.current
                            });
                        } else {
                            markersRef.current[s.id].setPosition(nextPos);
                            overlaysRef.current[s.id].setPosition(nextPos);
                        }

                        return { ...s, lat: nextLat, lng: nextLng, path: [...s.path, nextPos] };
                    }));
                }, 3000);

                return () => clearInterval(moveInterval);
            }, [view]);

            // 선택된 학생의 경로 표시 업데이트
            useEffect(() => {
                if (!mapRef.current) return;
                
                if (polylineRef.current) polylineRef.current.setMap(null);

                if (selectedStudentId) {
                    const student = students.find(s => s.id === selectedStudentId);
                    if (student && student.path.length > 0) {
                        polylineRef.current = new window.kakao.maps.Polyline({
                            path: student.path,
                            strokeWeight: 4,
                            strokeColor: student.color,
                            strokeOpacity: 0.8,
                            strokeStyle: 'dashed'
                        });
                        polylineRef.current.setMap(mapRef.current);
                    }
                }
            }, [students, selectedStudentId]);

            useEffect(() => {
                if (view === 'dashboard') setTimeout(initMap, 100);
            }, [view]);

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
                            <h2 className="text-2xl font-black mb-6 text-center tracking-tighter">EYE-LINK LOGIN</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input className="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all" placeholder="ID" value={loginInfo.id} onChange={e => setLoginInfo({...loginInfo, id: e.target.value})} required />
                                <input type="password" className="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all" placeholder="PW" value={loginInfo.pw} onChange={e => setLoginInfo({...loginInfo, pw: e.target.value})} required />
                                <button className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all">접속하기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    <header className="h-14 border-b flex items-center justify-between px-6 bg-white shrink-0 z-10">
                        <span className="font-black text-lg tracking-tighter">EYE-LINK MONITORING</span>
                        <div className="flex items-center gap-3">
                            <span className="text-xs font-bold text-slate-500">{user?.user_name} 관리자</span>
                            <button onClick={() => setView('login')} className="text-slate-400 hover:text-red-500 transition-colors"><LucideIcon name="log-out" size={18} /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* 학생 목록 사이드바 */}
                        <aside className="w-64 border-r flex flex-col bg-white shrink-0">
                            <div className="p-4 border-b bg-slate-50">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">학생 리스트</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {students.map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={() => setSelectedStudentId(s.id)}
                                        className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${selectedStudentId === s.id ? 'bg-slate-900 text-white shadow-lg' : 'hover:bg-slate-100'}`}
                                    >
                                        <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }}></div>
                                        <span className="text-sm font-bold">{s.name}</span>
                                        {selectedStudentId === s.id && <LucideIcon name="check" size={14} className="ml-auto" />}
                                    </button>
                                ))}
                            </div>
                        </aside>

                        {/* 지도 영역 */}
                        <div className="flex-1 relative">
                            <div id="map"></div>
                            <div className="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full border shadow-sm text-[10px] font-bold z-10">
                                3초마다 위치가 자동 갱신됩니다
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
