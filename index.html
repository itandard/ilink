<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; background-color: #f8fafc; }
        #map { width: 100%; height: 100%; position: absolute; }
        .student-marker-label {
            position: relative; bottom: 55px; padding: 5px 10px; border-radius: 12px;
            color: white; font-size: 11px; font-weight: 800; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid white; transform: translateX(-50%);
        }
        .login-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase 설정
        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [authForm, setAuthForm] = useState({ id: '', pw: '' });
            
            const mapInstance = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                if (view === 'main') {
                    initMap();
                }
            }, [view]);

            const initMap = () => {
                if (window.kakao && window.kakao.maps) {
                    const container = document.getElementById('map');
                    const options = {
                        center: new window.kakao.maps.LatLng(35.2456, 128.6922),
                        level: 4
                    };
                    mapInstance.current = new window.kakao.maps.Map(container, options);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    // 1. 사용자 정보 확인 (t_user)
                    const { data: userData, error: userError } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (userError || !userData) {
                        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                        setLoading(false);
                        return;
                    }

                    // 2. 로그인 기록 삽입 (t_login)
                    await supabase
                        .from('t_login')
                        .insert([
                            { 
                                user_id: authForm.id, 
                                platform: window.navigator.platform,
                                user_agent: window.navigator.userAgent,
                                update_time: new Date().toISOString() 
                            }
                        ]);

                    setUser(userData);
                    setView('main');
                    fetchStudents();

                } catch (err) {
                    console.error("오류:", err);
                    alert("시스템 오류가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            const fetchStudents = async () => {
                const { data, error } = await supabase.from('t_student').select('stu_no, stu_name');
                if (!error && data) {
                    setStudents(data.map((s, idx) => ({
                        id: s.stu_no,
                        name: s.stu_name,
                        color: ['#EF4444', '#3B82F6', '#10B981'][idx % 3],
                        lat: 35.2456 + (Math.random() * 0.002),
                        lng: 128.6922 + (Math.random() * 0.002)
                    })));
                }
            };

            if (view === 'login') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[400px] border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl text-white mb-4 shadow-lg shadow-blue-200">
                                    <i data-lucide="shield-check" className="w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter">아이-링크</h1>
                                <p className="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest">Control System Login</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="relative">
                                    <i data-lucide="user" className="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                                    <input 
                                        className="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 transition-all text-sm font-semibold"
                                        placeholder="관리자 아이디"
                                        value={authForm.id}
                                        onChange={e => setAuthForm({...authForm, id: e.target.value})}
                                        required
                                    />
                                </div>
                                <div className="relative">
                                    <i data-lucide="lock" className="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                                    <input 
                                        type="password"
                                        className="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 transition-all text-sm font-semibold"
                                        placeholder="비밀번호"
                                        value={authForm.pw}
                                        onChange={e => setAuthForm({...authForm, pw: e.target.value})}
                                        required
                                    />
                                </div>
                                <button 
                                    disabled={loading}
                                    className="w-full bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-100 active:scale-[0.98] hover:bg-blue-800 transition-all mt-4 flex items-center justify-center gap-2"
                                >
                                    {loading ? (
                                        <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                    ) : "로그인"}
                                </button>
                            </form>
                            
                            {/* 회원가입 링크 추가 */}
                            <div className="mt-8 pt-6 border-t border-slate-100 text-center">
                                <a href="signup.html" className="text-blue-600 text-xs font-bold hover:underline flex items-center justify-center gap-1">
                                    <i data-lucide="user-plus" className="w-3 h-3"></i>
                                    신규 관리자 계정 생성하기
                                </a>
                            </div>

                            <p className="text-center text-[11px] text-slate-400 mt-6 font-medium">
                                © 2026 EYE-LINK. All rights reserved.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <i data-lucide="activity" className="w-5 h-5"></i>
                            </div>
                            <h2 className="font-black text-lg tracking-tight text-slate-800">아이-링크 관제</h2>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                                    <i data-lucide="user" className="w-4 h-4 text-slate-600"></i>
                                </div>
                                <span className="text-sm font-bold text-slate-700">{user?.user_name} 관리자</span>
                            </div>
                            <button 
                                onClick={() => window.location.reload()} 
                                className="flex items-center gap-2 px-4 py-2 bg-slate-50 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all text-xs font-bold"
                            >
                                <i data-lucide="log-out" className="w-4 h-4"></i>
                                로그아웃
                            </button>
                        </div>
                    </header>
                    <div className="flex-1 relative">
                        <div id="map"></div>
                        <aside className="absolute left-6 top-6 bottom-6 w-72 bg-white/90 backdrop-blur-md shadow-2xl rounded-[2rem] z-[1000] p-6 border border-white/50 flex flex-col">
                            <div className="flex items-center justify-between mb-6">
                                <h3 className="font-black text-sm text-slate-800">실시간 위치 정보</h3>
                                <span className="px-2 py-1 bg-emerald-100 text-emerald-600 text-[10px] font-bold rounded-md animate-pulse">LIVE</span>
                            </div>
                            <div className="flex-1 space-y-3 overflow-y-auto pr-2">
                                {students.map(s => (
                                    <div key={s.id} className="p-4 bg-white/60 border border-slate-100 rounded-2xl flex items-center gap-4 hover:bg-white hover:shadow-md transition-all cursor-pointer group">
                                        <div className="relative">
                                            <div className="w-3 h-3 rounded-full shadow-sm" style={{backgroundColor: s.color}}></div>
                                            <div className="absolute inset-0 w-3 h-3 rounded-full animate-ping opacity-20" style={{backgroundColor: s.color}}></div>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-slate-800 group-hover:text-blue-600">{s.name}</span>
                                            <span className="text-[10px] font-medium text-slate-400">{s.id}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
