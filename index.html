<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-링크(Eye-Link) 관제 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@lucide/lab@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=173d252d4d96821fe2235b962120637b&libraries=services"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; bottom: 0; left: 0; right: 0; }

        .student-marker-label {
            position: relative;
            bottom: 55px;
            padding: 5px 10px;
            border-radius: 12px;
            color: white;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid white;
            transform: translateX(-50%);
        }

        .login-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://wedgzkwlkouheqfktskl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_OY6cu-DKhs1QuXJUCu0g4g_YwsRZNc-"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const InputField = ({ label, type="text", placeholder, value, onChange }) => (
            <div className="mb-4 text-left">
                <label className="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 tracking-tight">{label}</label>
                <input 
                    type={type}
                    placeholder={placeholder}
                    value={value}
                    onChange={onChange}
                    className="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-50/50 transition-all font-semibold text-sm"
                    required
                />
            </div>
        );

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [authForm, setAuthForm] = useState({ id: '', pw: '', name: '', school: '' });
            
            const mapInstance = useRef(null);
            const markers = useRef({});
            const polylines = useRef({});

            const fetchStudents = async () => {
                const { data, error } = await supabase
                    .from('t_student')
                    .select('stu_no, stu_name');
                
                if (!error && data) {
                    const colors = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899'];
                    const formatted = data.map((s, idx) => ({
                        id: s.stu_no,
                        name: s.stu_name,
                        color: colors[idx % colors.length],
                        lat: 35.2456 + (Math.random() * 0.002 - 0.001),
                        lng: 128.6922 + (Math.random() * 0.002 - 0.001),
                        path: [] 
                    }));
                    setStudents(formatted);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    const { data, error } = await supabase
                        .from('t_user')
                        .select('*')
                        .eq('user_id', authForm.id)
                        .eq('user_pw', authForm.pw)
                        .single();

                    if (data) {
                        // t_login에 데이터 삽입 (가장 확실한 직접 삽입 방식)
                        const { error: logError } = await supabase
                            .from('t_login')
                            .insert([
                                { 
                                    user_id: authForm.id, 
                                    device_info: window.navigator.userAgent,
                                    login_time: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })
                                }
                            ]);
                        
                        if (logError) {
                            console.error("Login log insertion failed:", logError);
                        }

                        setUser(data);
                        setView('main');
                        fetchStudents();
                    } else {
                        alert("아이디 또는 비밀번호를 확인해주세요.");
                    }
                } catch (err) {
                    console.error("Login Error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.rpc('fn_insert_user', {
                    p_user_id: authForm.id,
                    p_user_pw: authForm.pw,
                    p_user_name: authForm.name,
                    p_user_school: authForm.school
                });

                if (error) {
                    alert("등록 실패: " + error.message);
                } else {
                    alert("관리자 등록 완료!");
                    setView('login');
                }
                setLoading(false);
            };

            useEffect(() => {
                if (view === 'main' && students.length > 0) {
                    const interval = setInterval(() => {
                        setStudents(prev => prev.map(s => {
                            const newLat = s.lat + (Math.random() * 0.0004 - 0.0002);
                            const newLng = s.lng + (Math.random() * 0.0004 - 0.0002);
                            return {
                                ...s,
                                lat: newLat,
                                lng: newLng,
                                path: [...s.path, new window.kakao.maps.LatLng(newLat, newLng)].slice(-50)
                            };
                        }));
                    }, 3000);
                    return () => clearInterval(interval);
                }
            }, [view, students.length]);

            useEffect(() => {
                if (view === 'main') {
                    setTimeout(() => {
                        const container = document.getElementById('map');
                        if (container && !mapInstance.current) {
                            const options = { center: new window.kakao.maps.LatLng(35.2456, 128.6922), level: 3 };
                            mapInstance.current = new window.kakao.maps.Map(container, options);
                        }
                    }, 100);
                }
            }, [view]);

            useEffect(() => {
                if (view === 'main' && mapInstance.current) {
                    students.forEach(s => {
                        const position = new window.kakao.maps.LatLng(s.lat, s.lng);
                        
                        if (!markers.current[s.id]) {
                            const marker = new window.kakao.maps.Marker({ position, map: mapInstance.current });
                            const overlay = new window.kakao.maps.CustomOverlay({ 
                                position, 
                                content: `<div class="student-marker-label" style="background-color: ${s.color}">${s.name}</div>`,
                                map: mapInstance.current 
                            });
                            markers.current[s.id] = { marker, overlay };
                        } else {
                            markers.current[s.id].marker.setPosition(position);
                            markers.current[s.id].overlay.setPosition(position);
                        }

                        if (s.path.length > 1) {
                            if (!polylines.current[s.id]) {
                                const polyline = new window.kakao.maps.Polyline({
                                    path: s.path,
                                    strokeWeight: 3,
                                    strokeColor: s.color,
                                    strokeOpacity: 0.7,
                                    strokeStyle: 'dash' 
                                });
                                polyline.setMap(mapInstance.current);
                                polylines.current[s.id] = polyline;
                            } else {
                                polylines.current[s.id].setPath(s.path);
                            }
                        }
                    });
                }
            }, [students, view]);

            if (view === 'login' || view === 'signup') {
                return (
                    <div className="h-screen flex items-center justify-center login-bg px-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] w-full max-w-[420px] border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="inline-block p-4 bg-blue-700 rounded-2xl mb-5 shadow-xl shadow-blue-100">
                                    <i data-lucide="eye" className="text-white w-8 h-8"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter mb-1 font-sans">아이-링크</h1>
                                <p className="text-[11px] font-bold text-slate-500 tracking-tight uppercase">특수아동 현장체험학습 안전 솔루션</p>
                            </div>

                            <form onSubmit={view === 'login' ? handleLogin : handleSignup}>
                                {view === 'signup' && (
                                    <InputField label="이름" placeholder="실명 입력" value={authForm.name} onChange={e => setAuthForm({...authForm, name: e.target.value})} />
                                )}
                                <InputField label="아이디" placeholder="ID 입력" value={authForm.id} onChange={e => setAuthForm({...authForm, id: e.target.value})} />
                                <InputField label="비밀번호" type="password" placeholder="PW 입력" value={authForm.pw} onChange={e => setAuthForm({...authForm, pw: e.target.value})} />
                                {view === 'signup' && (
                                    <InputField label="학교" placeholder="학교명" value={authForm.school} onChange={e => setAuthForm({...authForm, school: e.target.value})} />
                                )}
                                <button className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all mt-4 active:scale-95">
                                    {loading ? "처리 중..." : (view === 'login' ? "로그인" : "등록 완료")}
                                </button>
                            </form>
                            <button onClick={() => setView(view === 'login' ? 'signup' : 'login')} className="w-full mt-6 text-xs font-bold text-slate-400 hover:text-blue-600">
                                {view === 'login' ? "관리자 계정이 없으신가요?" : "로그인으로 돌아가기"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-20 bg-white border-b flex items-center justify-between px-10 z-20">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center shadow-lg"><i data-lucide="shield-check" className="text-white w-6 h-6"></i></div>
                            <h2 className="font-black text-xl tracking-tighter">아이-링크 관제 시스템</h2>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right border-r pr-6">
                                <p className="text-sm font-black">{user?.user_name} 관리자</p>
                                <p className="text-[10px] text-slate-400 font-bold">{user?.user_school}</p>
                            </div>
                            <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-red-500 font-bold text-xs">로그아웃</button>
                        </div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-72 border-r bg-slate-50/50 flex flex-col p-5 space-y-3 custom-scroll overflow-y-auto">
                            <h3 className="text-[11px] font-black text-slate-500 uppercase px-1 mb-2">보호 대상 (실시간)</h3>
                            {students.map(s => (
                                <div key={s.id} className="bg-white border p-4 rounded-2xl shadow-sm flex items-center gap-3">
                                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: s.color }}></div>
                                    <div className="flex-1">
                                        <p className="text-sm font-bold">{s.name}</p>
                                        <p className="text-[9px] text-slate-400">학번: {s.id}</p>
                                    </div>
                                    <span className="px-2 py-1 bg-green-50 text-[9px] font-bold text-green-600 rounded-lg">정상</span>
                                </div>
                            ))}
                        </aside>
                        <main className="flex-1 relative">
                            <div id="map"></div>
                            <div className="absolute top-6 left-6 z-10 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-white flex items-center gap-3">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <p className="text-xs font-bold text-slate-800">이동 경로 추적 활성화</p>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        const interval = setInterval(() => {
            if (window.lucide) {
                window.lucide.createIcons();
                clearInterval(interval);
            }
        }, 100);
    </script>
</body>
</html>
